            const CONFIG = { DEFAULT_LANG: 'fr', STORAGE_PREFIX: 'luvia-', CACHE_DURATION: 5*60*1000 };

            const translations = {
                fr: { "skip-link":"Aller au contenu principal","nav-about":"A propos","nav-insurance":"Assurances","nav-tiqets":"Luvia+Tiqets","nav-gyg":"Luvia+GYG","nav-cta":"Nous contacter","nav-cta-mobile":"Nous contacter","lang-label":"Langue","error-not-found":"Article introuvable.","error-network":"Erreur de connexion.","error-invalid-id":"ID d'article invalide.","error-retry":"Reessayer","btn-share":"Partager","btn-save":"Sauvegarder","btn-saved":"Sauvegarde","toast-saved":"Article sauvegarde !","toast-removed":"Article retire des favoris","toast-copied":"Lien copie !","widget-title":"Découvrez aussi","team-note":"<strong>Travel Press</strong><br>Analyse & rédaction par notre équipe éditoriale" },
                en: { "skip-link":"Skip to main content","nav-about":"About","nav-insurance":"Insurance","nav-tiqets":"Luvia+Tiqets","nav-gyg":"Luvia+GYG","nav-cta":"Get in touch","nav-cta-mobile":"Get in touch","lang-label":"Language","error-not-found":"Article not found.","error-network":"Connection error.","error-invalid-id":"Invalid article ID.","error-retry":"Retry","btn-share":"Share","btn-save":"Save","btn-saved":"Saved","toast-saved":"Article saved!","toast-removed":"Article removed from favorites","toast-copied":"Link copied!","widget-title":"Discover also","team-note":"<strong>Travel Press</strong><br>Analysis & writing by our editorial team" }
            };

            const state = { currentLang: localStorage.getItem(CONFIG.STORAGE_PREFIX+'lang')||CONFIG.DEFAULT_LANG, cachedPostData: null, currentPostId: null, isLoading: false };
            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            function showToast(m,d=3000){ const t=document.getElementById('toast'); if(!t)return; t.textContent=m; t.classList.add('show'); clearTimeout(t.hideTimeout); t.hideTimeout=setTimeout(()=>t.classList.remove('show'),d); }
            function applyTranslations(lang){ document.querySelectorAll('[data-i18n]').forEach(el=>{ const k=el.getAttribute('data-i18n'); if(translations[lang]&&translations[lang][k]){ if(k==='team-note'||k==='hero-welcome'){ el.innerHTML=translations[lang][k]; }else{ el.textContent=translations[lang][k]; } } }); const ls=document.getElementById('langSelect'),lsm=document.getElementById('langSelectMobile'); if(ls)ls.value=lang; if(lsm)lsm.value=lang; document.documentElement.lang=lang; updateSaveButtonUI(); }
            function changeLanguage(lang){ if(lang===state.currentLang)return; state.currentLang=lang; localStorage.setItem(CONFIG.STORAGE_PREFIX+'lang',lang); applyTranslations(lang); if(state.cachedPostData) renderPost(state.cachedPostData); }
            function toggleMenu(){ const b=document.getElementById('burgerToggle'),m=document.getElementById('mobileMenu'); if(!m||!b)return; const o=m.classList.contains('open'); if(o){ m.classList.remove('open');b.classList.remove('open');b.setAttribute('aria-expanded','false');document.body.style.overflow=''; }else{ m.classList.add('open');b.classList.add('open');b.setAttribute('aria-expanded','true');document.body.style.overflow='hidden'; } }

            async function fetchPost(retry=0){ if(state.isLoading)return; state.isLoading=true; applyTranslations(state.currentLang); const p=new URLSearchParams(window.location.search),id=p.get('id'); if(!id||!/^[a-zA-Z0-9-]+$/.test(id)){ showError('error-invalid-id');state.isLoading=false;return; } state.currentPostId=id; try{ const {data:post,error}=await supabaseClient.from('posts').select('*').eq('id',state.currentPostId).single(); if(error)throw error; if(!post)throw new Error('Article non trouve'); state.cachedPostData=post; renderPost(post); setupActionButtons(); }catch(e){ console.error('Erreur:',e); if(retry<2){ setTimeout(()=>fetchPost(retry+1),1000*(retry+1)); state.isLoading=false;return; } showError('error-network'); }finally{ state.isLoading=false; } }

            function renderPost(post){ try{ const isEN=state.currentLang==='en'; const title=isEN&&post.title_en?post.title_en:post.title; const cat=isEN&&post.category_en?post.category_en:(post.category||'News'); const content=isEN&&post.content_en?post.content_en:post.content; document.title=title+' - Travel Press'; document.getElementById('article-title').textContent=title; document.getElementById('article-cat').textContent=cat;
            
            // Images slider
            const imgUrls = post.image_url ? post.image_url.split('||').map(u => u.trim()).filter(u => u) : ['https://images.unsplash.com/photo-1547471080-7cc2caa01a7e?q=80&w=1200'];
            const imgSlider = document.getElementById('article-img-slider');
            const imgDots = document.getElementById('img-dots');
            const arrowLeft = document.getElementById('img-arrow-left');
            const arrowRight = document.getElementById('img-arrow-right');
            
            if (imgSlider && imgDots) {
                imgSlider.innerHTML = imgUrls.map((url, i) => `<img class="article-main-img" src="${url}" alt="${title} - Image ${i+1}" loading="${i===0?'eager':'lazy'}">`).join('');
                
                if (imgUrls.length > 1) {
                    // Plusieurs images : afficher dots et flèches
                    imgDots.classList.add('visible');
                    if (arrowLeft) arrowLeft.classList.add('visible');
                    if (arrowRight) arrowRight.classList.add('visible');
                    imgDots.innerHTML = imgUrls.map((_, i) => `<span class="img-dot${i===0?' active':''}" onclick="goToImg(${i})"></span>`).join('');
                } else {
                    // Une seule image : cacher dots et flèches
                    imgDots.classList.remove('visible');
                    if (arrowLeft) arrowLeft.classList.remove('visible');
                    if (arrowRight) arrowRight.classList.remove('visible');
                    imgDots.innerHTML = '';
                }
                imgSlider.scrollLeft = 0; currentImgIndex = 0;
            }
            
            document.getElementById('article-date').textContent=new Date(post.created_at).toLocaleDateString(isEN?'en-US':'fr-FR',{month:'long',day:'numeric',year:'numeric'});
            const metaDesc=document.querySelector('meta[name="description"]'); if(metaDesc) metaDesc.setAttribute('content',(post.excerpt||title).substring(0,160));
            const canonical=document.querySelector('link[rel="canonical"]'); if(canonical) canonical.href=SITE_URL+'/post.html?id='+post.id;
            const sd=document.getElementById('structured-data'); if(sd){ sd.textContent=JSON.stringify({"@context":"https://schema.org","@type":"NewsArticle","headline":title,"image":imgUrls[0],"datePublished":post.created_at,"dateModified":post.created_at,"author":{"@type":"Organization","name":"Travel Press"},"publisher":{"@type":"Organization","name":"Travel Press","logo":{"@type":"ImageObject","url":"https://press.luviaplace.com/logo.png"}}}); }
            const raw=marked.parse(content||''); const clean=DOMPurify.sanitize(raw,{ALLOWED_TAGS:['p','br','strong','em','u','h1','h2','h3','h4','h5','h6','ul','ol','li','a','img','blockquote','code','pre','span','div','table','thead','tbody','tr','td','th'],ALLOWED_ATTR:['href','src','alt','class','target','rel','width','height']}); document.getElementById('article-body').innerHTML=clean; document.getElementById('skeleton-view').style.display='none'; document.getElementById('article-view').style.display='block'; document.getElementById('error-container').style.display='none';
            const articleBody=document.getElementById('article-body'); const widgetSlider=document.getElementById('widget-slider-container');
            if(articleBody&&widgetSlider){ const paragraphs=articleBody.querySelectorAll('p'); if(paragraphs.length>=4){ paragraphs[3].parentNode.insertBefore(widgetSlider,paragraphs[3].nextSibling); }else if(paragraphs.length>=2){ const mid=paragraphs[Math.floor(paragraphs.length/2)]; mid.parentNode.insertBefore(widgetSlider,mid.nextSibling); }else{ articleBody.appendChild(widgetSlider); } widgetSlider.style.display='block'; }
            updateSaveButtonUI(); }catch(e){ console.error('Erreur de rendu:',e); showError('error-not-found'); } }
            function showError(t='error-not-found'){ document.getElementById('skeleton-view').style.display='none'; document.getElementById('article-view').style.display='none'; document.getElementById('error-container').style.display='block'; const m=document.getElementById('error-message'); if(m&&translations[state.currentLang]?.[t]) m.textContent=translations[state.currentLang][t]; }
            function setupActionButtons(){ document.getElementById('btn-share')?.addEventListener('click',handleShare); document.getElementById('btn-save')?.addEventListener('click',toggleSavePost); updateSaveButtonUI(); }
            async function handleShare(){ const url=state.currentPostId?SITE_URL+'/articles/'+state.currentPostId+'.html':window.location.href; if(navigator.share){ try{await navigator.share({title:document.title,url:url});}catch(e){if(e.name!=='AbortError')copyToClipboard(url);} }else{copyToClipboard(url);} }
            function copyToClipboard(url){ url=url||window.location.href; navigator.clipboard.writeText(url).then(()=>showToast(translations[state.currentLang]['toast-copied'])).catch(()=>{ const t=document.createElement('textarea');t.value=url;t.style.position='fixed';t.style.opacity='0';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast(translations[state.currentLang]['toast-copied']); }); }
            function toggleSavePost(){ if(!state.currentPostId)return; let s=JSON.parse(localStorage.getItem(CONFIG.STORAGE_PREFIX+'saved-posts')||'[]'); const i=s.indexOf(state.currentPostId); if(i>-1){s.splice(i,1);showToast(translations[state.currentLang]['toast-removed']);}else{s.push(state.currentPostId);showToast(translations[state.currentLang]['toast-saved']);} localStorage.setItem(CONFIG.STORAGE_PREFIX+'saved-posts',JSON.stringify(s));updateSaveButtonUI(); }
            function updateSaveButtonUI(){ if(!state.currentPostId)return; const b=document.getElementById('btn-save'),t=document.getElementById('text-save'); if(!b||!t)return; const s=JSON.parse(localStorage.getItem(CONFIG.STORAGE_PREFIX+'saved-posts')||'[]'); if(s.includes(state.currentPostId)){b.classList.add('saved');t.textContent=translations[state.currentLang]['btn-saved'];b.setAttribute('aria-pressed','true');}else{b.classList.remove('saved');t.textContent=translations[state.currentLang]['btn-save'];b.setAttribute('aria-pressed','false');} }

            // Image Slider
            let currentImgIndex = 0;
            window.slideImg = function(dir) { const sl=document.getElementById('article-img-slider'); const imgs=sl.querySelectorAll('.article-main-img'); if(!imgs.length)return; currentImgIndex=Math.max(0,Math.min(currentImgIndex+dir,imgs.length-1)); imgs[currentImgIndex].scrollIntoView({behavior:'smooth',block:'nearest'}); updateImgDots(); };
            window.goToImg = function(idx) { const sl=document.getElementById('article-img-slider'); const imgs=sl.querySelectorAll('.article-main-img'); if(!imgs.length)return; currentImgIndex=idx; imgs[idx].scrollIntoView({behavior:'smooth',block:'nearest'}); updateImgDots(); };
            function updateImgDots(){ document.querySelectorAll('.img-dot').forEach((d,i)=>d.classList.toggle('active',i===currentImgIndex)); }
            document.addEventListener('DOMContentLoaded',()=>{ const sl=document.getElementById('article-img-slider'); if(sl){ sl.addEventListener('scroll',()=>{ const imgs=sl.querySelectorAll('.article-main-img'); if(!imgs.length)return; const pos=sl.scrollLeft+sl.offsetWidth/2; let idx=0; imgs.forEach((img,i)=>{if(pos>img.offsetLeft)idx=i;}); if(idx!==currentImgIndex){currentImgIndex=idx;updateImgDots();} }); } });

            // Widget Slider
            let currentWidget = 0;
            window.switchWidget = function(index) { document.querySelectorAll('.widget-slide').forEach(s=>s.classList.remove('active')); document.querySelectorAll('.widget-dot').forEach(d=>d.classList.remove('active')); document.getElementById('widget-slide-'+index).classList.add('active'); document.querySelectorAll('.widget-dot')[index].classList.add('active'); currentWidget=index; };
            setInterval(()=>{ const c=document.getElementById('widget-slider-container'); if(c&&c.style.display!=='none'){ const n=currentWidget===1?0:currentWidget+1; switchWidget(n); } },8000);

            document.getElementById('burgerToggle')?.addEventListener('click',toggleMenu);
            document.querySelectorAll('.nav-mobile a').forEach(l=>l.addEventListener('click',()=>{ if(document.getElementById('mobileMenu')?.classList.contains('open'))toggleMenu(); }));
            document.getElementById('langSelect')?.addEventListener('change',e=>changeLanguage(e.target.value));
            document.getElementById('langSelectMobile')?.addEventListener('change',e=>{ document.getElementById('langSelect').value=e.target.value;changeLanguage(e.target.value); });
            document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&document.getElementById('mobileMenu')?.classList.contains('open'))toggleMenu(); });
            document.addEventListener('click',e=>{ const m=document.getElementById('mobileMenu'),b=document.getElementById('burgerToggle'); if(m?.classList.contains('open')&&!m.contains(e.target)&&!b.contains(e.target))toggleMenu(); });
            window.addEventListener('DOMContentLoaded',()=>{ fetchPost(); });
        })();

        fetch('footer.html').then(r=>r.text()).then(d=>{ document.getElementById('footer-placeholder').innerHTML=d; }).catch(()=>{ document.getElementById('footer-placeholder').innerHTML='<p style="text-align:center;padding:2rem;color:#999;">© 2024 Travel Press</p>'; });
    </script>
</body>
</html>
