       <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1a1a1a; 
            --text-muted: #757575;
            --accent: #0046e4; 
            --border: #f0f0f0;
            --max-width: 720px; 
            --skeleton-base: #f8f9fa;
            --skeleton-shimmer: #e9ecef;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body { height: 100%; width: 100%; max-width: 100vw; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            -webkit-font-smoothing: antialiased; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100%;
            max-width: 100vw;
        }

        main {
            flex: 1 0 auto;
            width: 100%;
            max-width: 100vw;
        }

        .skip-link {
            position: absolute;
            top: -100%;
            left: 0;
            background: var(--accent);
            color: white;
            padding: 0.5rem 1rem;
            z-index: 1000;
            text-decoration: none;
        }
        .skip-link:focus { top: 0; }

        header { 
            border-bottom: 1px solid var(--border); 
            background: #ffffff; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            height: 75px; 
            flex-shrink: 0;
            width: 100%;
            max-width: 100vw;
        }
        .nav-container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 2rem; 
            height: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .logo-wrap { display: flex; align-items: center; height: 100%; text-decoration: none; }
        .logo-img { height: 52px; width: auto; object-fit: contain; }
        
        nav.nav-desktop { display: flex; gap: 2.5rem; align-items: center; }
        nav.nav-desktop a { 
            text-decoration: none; 
            color: var(--text-main); 
            font-size: 0.9rem; 
            font-weight: 500; 
            transition: color 0.2s; 
        }
        nav.nav-desktop a:hover { color: var(--accent); }
        .cta-main-site { 
            background-color: var(--accent); 
            color: #ffffff !important; 
            padding: 0.65rem 1.4rem; 
            border-radius: 20px; 
            font-size: 0.85rem; 
            font-weight: 600; 
            text-decoration: none; 
            transition: opacity 0.2s; 
        }
        .cta-main-site:hover { opacity: 0.9; }

        .lang-dropdown { 
            background: #ffffff; 
            border: 1px solid var(--border); 
            padding: 0.4rem 0.8rem; 
            border-radius: 20px; 
            font-size: 0.8rem; 
            font-weight: 600; 
            cursor: pointer; 
        }

        .burger-menu { 
            display: none; 
            background: none; 
            border: none; 
            cursor: pointer; 
            padding: 0.5rem; 
            z-index: 110; 
        }
        .burger-menu span { 
            display: block; 
            width: 22px; 
            height: 2px; 
            background: var(--text-main); 
            margin: 5px 0; 
            transition: 0.3s ease; 
        }
        
        .nav-mobile { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100vh; 
            background: #ffffff; 
            z-index: 105; 
            padding: 6rem 2rem 2rem 2rem; 
            flex-direction: column; 
            gap: 2rem; 
            overflow-y: auto;
        }
        .nav-mobile a { 
            text-decoration: none; 
            color: var(--text-main); 
            font-size: 1.3rem; 
            font-weight: 600; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 0.75rem;
        }
        .nav-mobile .cta-mobile-site { color: var(--accent); border: none; margin-top: 1rem; font-size: 1.4rem; }
        .nav-mobile.open { display: flex; }
        
        .burger-menu.open span:nth-child(1) { transform: rotate(-45deg) translate(-5px, 5px); }
        .burger-menu.open span:nth-child(2) { opacity: 0; }
        .burger-menu.open span:nth-child(3) { transform: rotate(45deg) translate(-5px, -5px); }

        @media (max-width: 992px) {
            nav.nav-desktop { display: none; }
            .burger-menu { display: block; }
        }

        .article-container { 
            max-width: var(--max-width); 
            margin: 4rem auto; 
            padding: 0 1.5rem; 
            width: 100%;
        }
        
        .article-meta { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1.5rem; }
        .tag-badge { 
            background: transparent; 
            color: var(--accent); 
            font-size: 0.8rem;

            text-transform: uppercase;

        .article-date { font-size: 0.95rem; color: var(--text-muted); font-weight: 500; }

            font-weight: 800; 
            line-height: 1.15; 
            margin-bottom: 2.5rem; 
            letter-spacing: -0.03em; 
            color: #111111;

        .article-img-wrapper {
            width: 100vw;
            margin-left: calc(-50vw + 50%);
            margin-right: calc(-50vw + 50%);
            margin-bottom: 2rem;
            overflow: hidden;
        }
        .article-main-img { 
            width: 100%;
            height: 70vh; 
            min-height: 400px;
            object-fit: cover; 
            display: block;
        }

        .article-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 3.5rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }
        .action-btn {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 1.2rem;
            background: transparent;
            border: 1px solid #dcdcdc;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;

        .action-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }
        .action-btn.saved svg { fill: var(--accent); }
        
        .error-container { display: none; text-align: center; margin-top: 5rem; padding: 2rem; }
        .error-message { color: var(--text-muted); font-weight: 500; font-size: 1.2rem; margin-bottom: 1rem; }
        .error-retry {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.8rem 2rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;

        .article-body p { margin-bottom: 2rem; }
        .article-body img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 3.5rem auto;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        .article-body blockquote {
            border-left: none;
            padding: 2rem 2.5rem;
            margin: 3.5rem 0;
            background: #f9fbff; 
            border-radius: 0 16px 16px 0;
            font-style: italic;
            color: #1a1a1a;
            font-size: 1.35rem;
            line-height: 1.7;
            position: relative;
        }
        .article-body blockquote::before {
            content: "\201C";
            position: absolute;
            left: 15px;
            top: -10px;
            font-size: 4rem;
            color: var(--accent);
            opacity: 0.15;
            font-family: serif;
            line-height: 1;
        }
        .article-body h1, .article-body h2 { 
            font-size: 1.9rem; 
            font-weight: 800; 
            margin: 3.5rem 0 1.5rem 0; 
            letter-spacing: -0.02em; 
            color: #111111; 
        }
        .article-body h3 { font-size: 1.4rem; font-weight: 700; margin: 2.5rem 0 1rem 0; }
        .article-body ul, .article-body ol { margin-bottom: 2rem; padding-left: 1.5rem; }
        .article-body li { margin-bottom: 0.8rem; }
        .article-body a { 
            color: var(--accent); 
            text-decoration: none; 
            border-bottom: 1px solid rgba(0, 70, 228, 0.3);
        }
        .article-body a:hover { border-bottom-color: var(--accent); }
        .article-body strong { font-weight: 700; color: #111111; }

        .article-body table {
            width: 100%;
            max-width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            font-size: 0.95rem;
            display: block;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .article-body thead { background: #f8f9fa; }
        .article-body th {
            padding: 0.8rem 1rem;
            text-align: left;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #111;
            border-bottom: 2px solid #e5e5e5;
            white-space: nowrap;
        }
        .article-body td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
            white-space: nowrap;
        }
        .article-body tr:hover td { background: #fafbff; }
        .article-body tbody tr:last-child td { border-bottom: 2px solid #e5e5e5; }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 1rem 2rem;
            border-radius: 30px;
            font-weight: 500;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            font-family: inherit;
            pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #f8f9fa 25%, #e9ecef 50%, #f8f9fa 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
            border-radius: 6px;
        }

        @media (max-width: 768px) {
            .article-container { 
                margin: 2rem auto; 
                padding: 0 1.2rem; 
                width: 100%;
                max-width: 100%;
            }
            h1.article-title { font-size: 2.2rem; margin-bottom: 1.5rem; }
            .article-img-wrapper {
                width: 100vw;
                margin-left: -1.2rem;
                margin-right: -1.2rem;
                width: calc(100% + 2.4rem);
            }
            .article-main-img { height: 45vh; min-height: 300px; }
            .article-actions { margin-bottom: 2.5rem; padding-bottom: 1.5rem; flex-wrap: wrap; }
            .article-body { font-size: 1.05rem; word-wrap: break-word; overflow-wrap: break-word; }
            .article-body table { font-size: 0.8rem; }
            .article-body th, .article-body td { padding: 0.5rem 0.6rem; }
            .article-meta { flex-direction: column; align-items: flex-start; gap: 0.8rem; }
                    }
    </style>

            };

            const translations = {
                fr: {
                    "skip-link": "Aller au contenu principal",

                    "nav-insurance": "Assurances",
                    "nav-tiqets": "Luvia+Tiqets",

            const state = {
                currentLang: localStorage.getItem(CONFIG.STORAGE_PREFIX + 'lang') || CONFIG.DEFAULT_LANG,
                cachedPostData: null,
                currentPostId: null,
                isLoading: false
            };

            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            function showToast(message, duration = 3000) {
                const toast = document.getElementById('toast');
                if (!toast) return;
                toast.textContent = message;
                toast.classList.add('show');
                clearTimeout(toast.hideTimeout);
                toast.hideTimeout = setTimeout(() => toast.classList.remove('show'), duration);
            }

            function applyTranslations(lang) {
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (translations[lang] && translations[lang][key]) {
                        el.textContent = translations[lang][key];
                    }
                });
                
                const langSelect = document.getElementById('langSelect');
                const langSelectMobile = document.getElementById('langSelectMobile');
                if (langSelect) langSelect.value = lang;
                if (langSelectMobile) langSelectMobile.value = lang;
                
                document.documentElement.lang = lang;
                updateSaveButtonUI();
            }

            function changeLanguage(lang) {
                if (lang === state.currentLang) return;
                
                state.currentLang = lang;
                localStorage.setItem(CONFIG.STORAGE_PREFIX + 'lang', lang);
                applyTranslations(lang);
                
                if (state.cachedPostData) {
                    renderPost(state.cachedPostData);
                }
            }

            function toggleMenu() {
                const burger = document.getElementById('burgerToggle');
                const menu = document.getElementById('mobileMenu');
                if (!menu || !burger) return;
                
                const isOpen = menu.classList.contains('open');
                
                if (isOpen) {
                    menu.classList.remove('open');
                    burger.classList.remove('open');
                    burger.setAttribute('aria-expanded', 'false');
                    document.body.style.overflow = '';
                } else {
                    menu.classList.add('open');
                    burger.classList.add('open');
                    burger.setAttribute('aria-expanded', 'true');
                    document.body.style.overflow = 'hidden';
                }
            }

            async function fetchPost(retryCount = 0) {
                if (state.isLoading) return;
                state.isLoading = true;
                
                applyTranslations(state.currentLang);

                const urlParams = new URLSearchParams(window.location.search);
                const rawId = urlParams.get('id');
                
                if (!rawId || !/^[a-zA-Z0-9-]+$/.test(rawId)) {
                    showError('error-invalid-id');
                    state.isLoading = false;
                    return;
                }
                
                state.currentPostId = rawId;

                if (!window.location.pathname.includes('/articles/')) {
                    const articleUrl = SITE_URL + '/articles/' + state.currentPostId + '.html';
                    var canonical = document.querySelector('link[rel="canonical"]');
                    if (canonical) {
                        canonical.href = articleUrl;
                    } else {
                        canonical = document.createElement('link');
                        canonical.rel = 'canonical';
                        canonical.href = articleUrl;
                        document.head.appendChild(canonical);
                    }
                }

                try {
                    const { data: post, error } = await supabaseClient
                        .from('posts')
                        .select('*')
                        .eq('id', state.currentPostId)
                        .single();

                    if (error) throw error;
                    if (!post) throw new Error('Article non trouve');

                    state.cachedPostData = post;
                    renderPost(post);
                    setupActionButtons();
                    
                    try {
                        sessionStorage.setItem(
                            CONFIG.STORAGE_PREFIX + 'post_' + state.currentPostId,
                            JSON.stringify({ data: post, timestamp: Date.now() })
                        );
                    } catch (e) {}
                    
                } catch (error) {
                    console.error('Erreur:', error);
                    
                    try {
                        const cached = sessionStorage.getItem(CONFIG.STORAGE_PREFIX + 'post_' + state.currentPostId);
                        if (cached) {
                            const { data: post, timestamp } = JSON.parse(cached);
                            if (Date.now() - timestamp < CONFIG.CACHE_DURATION) {
                                state.cachedPostData = post;
                                renderPost(post);
                                setupActionButtons();
                                state.isLoading = false;
                                return;
                            }
                        }
                    } catch (cacheError) {}
                    
                    if (retryCount < 2) {
                        setTimeout(() => fetchPost(retryCount + 1), 1000 * (retryCount + 1));
                        state.isLoading = false;
                        return;
                    }
                    
                    showError('error-network');
                } finally {
                    state.isLoading = false;
                }
            }

            function renderPost(post) {
                try {
                    const isEnglish = state.currentLang === 'en';
                    
                    const displayTitle = (isEnglish && post.title_en) ? post.title_en : post.title;
                    const displayCategory = (isEnglish && post.category_en) ? post.category_en : (post.category || 'News');
                    const displayContent = (isEnglish && post.content_en) ? post.content_en : post.content;

                    document.title = displayTitle + ' - Luvia Press';
                    
                    document.getElementById('article-title').textContent = displayTitle;
                    document.getElementById('article-cat').textContent = displayCategory;
                    
                    const imgElement = document.getElementById('article-img');
                    imgElement.src = post.image_url || 'https://images.unsplash.com/photo-1547471080-7cc2caa01a7e?q=80&w=1200';
                    imgElement.alt = displayTitle;
                    
                    document.getElementById('article-date').textContent = new Date(post.created_at).toLocaleDateString(
                        isEnglish ? 'en-US' : 'fr-FR', 
                        { month: 'long', day: 'numeric', year: 'numeric' }
                    );
                    
                    const rawHtml = marked.parse(displayContent || '');
                    const cleanHtml = DOMPurify.sanitize(rawHtml, {
                        ALLOWED_TAGS: ['p', 'br', 'strong', 'em', 'u', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 
                                       'ul', 'ol', 'li', 'a', 'img', 'blockquote', 'code', 'pre', 'span', 'div', 
                                       'table', 'thead', 'tbody', 'tr', 'td', 'th'],
                        ALLOWED_ATTR: ['href', 'src', 'alt', 'class', 'target', 'rel', 'width', 'height']
                    });
                    
                    document.getElementById('article-body').innerHTML = cleanHtml;

                    document.getElementById('skeleton-view').style.display = 'none';
                    document.getElementById('article-view').style.display = 'block';
                    document.getElementById('error-container').style.display = 'none';
                    
                    updateSaveButtonUI();
                    
                } catch (error) {
                    console.error('Erreur de rendu:', error);
                    showError('error-not-found');
                }
            }

            function showError(errorType = 'error-not-found') {
                document.getElementById('skeleton-view').style.display = 'none';
                document.getElementById('article-view').style.display = 'none';
                document.getElementById('error-container').style.display = 'block';
                
                const errorMessage = document.getElementById('error-message');
                if (errorMessage && translations[state.currentLang]?.[errorType]) {
                    errorMessage.textContent = translations[state.currentLang][errorType];
                }
            }

            function setupActionButtons() {
                document.getElementById('btn-share')?.addEventListener('click', handleShare);
                document.getElementById('btn-save')?.addEventListener('click', toggleSavePost);
                updateSaveButtonUI();
            }

            async function handleShare() {
                const shareUrl = state.currentPostId ? 
                    SITE_URL + '/articles/' + state.currentPostId + '.html' : 
                    window.location.href;
                
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: document.title,
                            url: shareUrl
                        });
                    } catch (err) {
                        if (err.name !== 'AbortError') copyToClipboard(shareUrl);
                    }
                } else {
                    copyToClipboard(shareUrl);
                }
            }
fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            })
            .catch(() => {
                document.getElementById('footer-placeholder').innerHTML = '<footer style="text-align:center;padding:2rem;color:#999;">© 2024 Luvia Press</footer>';
            });
            function copyToClipboard(url) {
                url = url || window.location.href;
                navigator.clipboard.writeText(url).then(() => {
                    showToast(translations[state.currentLang]['toast-copied']);
                }).catch(() => {
                    const textarea = document.createElement('textarea');
                    textarea.value = url;
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    showToast(translations[state.currentLang]['toast-copied']);
                });
            }

            function toggleSavePost() {
                if (!state.currentPostId) return;
                
                let savedPosts = JSON.parse(localStorage.getItem(CONFIG.STORAGE_PREFIX + 'saved-posts') || '[]');
                const index = savedPosts.indexOf(state.currentPostId);
                
                if (index > -1) {
                    savedPosts.splice(index, 1);
                    showToast(translations[state.currentLang]['toast-removed']);
                } else {
                    savedPosts.push(state.currentPostId);
                    showToast(translations[state.currentLang]['toast-saved']);
                }
                
                localStorage.setItem(CONFIG.STORAGE_PREFIX + 'saved-posts', JSON.stringify(savedPosts));
                updateSaveButtonUI();
            }

            function updateSaveButtonUI() {
                if (!state.currentPostId) return;
                
                const saveBtn = document.getElementById('btn-save');
                const saveText = document.getElementById('text-save');
                if (!saveBtn || !saveText) return;

                const savedPosts = JSON.parse(localStorage.getItem(CONFIG.STORAGE_PREFIX + 'saved-posts') || '[]');
                
                if (savedPosts.includes(state.currentPostId)) {
                    saveBtn.classList.add('saved');
                    saveText.textContent = translations[state.currentLang]['btn-saved'];
                    saveBtn.setAttribute('aria-pressed', 'true');
                } else {
                    saveBtn.classList.remove('saved');
                    saveText.textContent = translations[state.currentLang]['btn-save'];
                    saveBtn.setAttribute('aria-pressed', 'false');
                }
            }

           
                
                
            // Écouteur burger menu
            document.getElementById('burgerToggle')?.addEventListener('click', toggleMenu);

            // Écouteurs liens menu mobile (fermer le menu au clic)
            document.querySelectorAll('.nav-mobile a').forEach(function(link) {
                link.addEventListener('click', function() {
                    const menu = document.getElementById('mobileMenu');
                    if (menu && menu.classList.contains('open')) {
                        toggleMenu();
                    }
                });
            });

            // Sélecteurs de langue
            document.getElementById('langSelect')?.addEventListener('change', function(e) {
                changeLanguage(e.target.value);
            });
            
            document.getElementById('langSelectMobile')?.addEventListener('change', function(e) {
                document.getElementById('langSelect').value = e.target.value;
                changeLanguage(e.target.value);
            });
            
            // Fermeture menu avec Escape
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    const menu = document.getElementById('mobileMenu');
                    if (menu && menu.classList.contains('open')) {
                        toggleMenu();
                    }
                }
            });

            // Fermeture menu avec clic extérieur
            document.addEventListener('click', function(e) {
                const menu = document.getElementById('mobileMenu');
                const burger = document.getElementById('burgerToggle');
                if (menu && menu.classList.contains('open') && 
                    !menu.contains(e.target) && 
                    !burger.contains(e.target)) {
                    toggleMenu();
                }
            });

            // Démarrage
            window.addEventListener('DOMContentLoaded', function() {
                fetchPost();
                
            });

        })();
        
    </script>
</body>
</html>
