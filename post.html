    <style>
        :root {

            --paper-alt: #f4f3ef;
            --ink: #131313;
            --ink-soft: #3a3a3a;
            --muted: #6b6963;
            --rule: #131313;

            --accent: #ac1118;

            --skeleton-shimmer: #e6e3da;

        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* ===== WIDGET SLIDER ===== */

            position: relative;
            border-top: 3px solid var(--rule);
            border-bottom: 1px solid var(--rule-light);
            padding: 1.75rem 0 2rem;
        }
        .widget-slider-title {
            font-family: var(--mono);
            font-size: 0.72rem;

            letter-spacing: 0.14em;

            margin-bottom: 1.25rem;
            color: var(--accent);

        .widget-slide { display: none; }
        .widget-slide.active { display: block; }
        .widget-nav {

            justify-content: flex-start;
            gap: 0.5rem;
            margin-bottom: 1.5rem;

        .widget-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;

            cursor: pointer;
            transition: background 0.3s;
            border: none;
            padding: 0;

        }

            color: var(--muted);

            display: flex; justify-content: space-between; align-items: center;
        }
        .masthead-top .dateline { text-transform: uppercase; }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; height: 84px; display: flex; justify-content: space-between; align-items: center; }
        .logo-wrap { display: flex; align-items: center; height: 100%; text-decoration: none; }
        .logo-img { height: 46px; width: auto; object-fit: contain; filter: grayscale(1) contrast(1.3) brightness(0.2); }

        nav.nav-desktop { display: flex; gap: 2.2rem; align-items: center; }

        .nav-mobile { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--paper); z-index: 105; padding: 6rem 2rem 2rem 2rem; flex-direction: column; gap: 2rem; overflow-y: auto; }

        .burger-menu.open span:nth-child(3) { transform: rotate(45deg) translate(-5px, -5px); }
        @media (max-width: 992px) { nav.nav-desktop { display: none; } .burger-menu { display: block; } }

        /* ===== ARTICLE ===== */
        .article-container { max-width: var(--max-width); margin: 3.5rem auto; padding: 0 1.5rem; }
        .article-meta { display: flex; align-items: baseline; gap: 1.25rem; margin-bottom: 1.25rem; }

        /* Slider d'images */
        .article-img-wrapper { width: 100vw; margin-left: calc(-50vw + 50%); margin-right: calc(-50vw + 50%); margin-bottom: 0.75rem; overflow: hidden; position: relative; border-top: 1px solid var(--rule-light); border-bottom: 1px solid var(--rule-light); }
        .article-img-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; cursor: grab; }
        .article-img-slider::-webkit-scrollbar { display: none; }
        .article-img-slider:active { cursor: grabbing; }
        .article-main-img { width: 100%; height: 62vh; min-height: 380px; object-fit: cover; display: block; flex-shrink: 0; scroll-snap-align: start; filter: grayscale(0.06); }
        .img-dots { position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%); display: none; gap: 0.4rem; z-index: 5; }
        .img-dots.visible { display: flex; }
        .img-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.3s ease; border: none; padding: 0; }
        .img-dot.active { background: #ffffff; width: 18px; border-radius: 10px; }
        .img-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.92); border: 1px solid var(--ink); width: 48px; height: 48px; border-radius: 50%; cursor: pointer; font-size: 1.3rem; z-index: 5; display: none; align-items: center; justify-content: center; color: var(--ink); transition: opacity 0.3s; opacity: 0; }
        .img-arrow.visible { display: flex; }
        .article-img-wrapper:hover .img-arrow.visible { opacity: 1; }
        .img-arrow-left { left: 0.5rem; }
        .img-arrow-right { right: 0.5rem; }
        .article-img-caption { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); padding: 0.6rem 0 0; text-align: left; }

        .article-actions { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 3rem; padding-bottom: 1.75rem; padding-top: 1rem; border-bottom: 1px solid var(--rule-light); }
        .action-btn { display: flex; align-items: center; gap: 0.55rem; padding: 0.5rem 1.1rem; background: transparent; border: 1px solid var(--ink); border-radius: 0; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink); cursor: pointer; transition: all 0.2s ease; font-family: var(--sans); }
        .action-btn:hover { border-color: var(--accent); color: #fff; background: var(--accent); }
        .action-btn.saved { border-color: var(--accent); color: #fff; background: var(--accent); }
        .action-btn svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 2; }
        .action-btn.saved svg { fill: #fff; }
        .article-note { margin-left: auto; font-family: var(--mono); font-size: 0.7rem; color: var(--muted); font-style: normal; text-align: right; line-height: 1.4; max-width: 200px; text-transform: uppercase; letter-spacing: 0.02em; }
        .article-note strong { color: var(--ink); font-weight: 700; }

        .error-container { display: none; text-align: center; margin-top: 5rem; padding: 2rem; }
        .error-message { color: var(--muted); font-weight: 500; font-size: 1.2rem; margin-bottom: 1rem; font-family: var(--serif); }
        .error-retry { display: inline-block; margin-top: 1rem; padding: 0.8rem 2rem; background: var(--ink); color: white; border: none; border-radius: 0; cursor: pointer; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; font-family: inherit; }

        .article-body { font-family: var(--serif); font-size: 1.22rem; line-height: 1.75; color: #232323; font-weight: 400; word-wrap: break-word; overflow-wrap: break-word; }
        .article-body > p:first-of-type::first-letter { font-family: var(--serif); font-size: 3.8rem; font-weight: 700; float: left; line-height: 0.85; margin: 0.05em 0.12em 0 0; color: var(--ink); }
        .article-body p { margin-bottom: 1.75rem; }
        .article-body img { max-width: 100%; height: auto; display: block; margin: 3rem auto; border-radius: 0; box-shadow: none; border: 1px solid var(--rule-light); }
        .article-body blockquote { border-left: 3px solid var(--accent); padding: 0.5rem 0 0.5rem 1.75rem; margin: 3rem 0; background: transparent; border-radius: 0; font-style: italic; color: var(--ink); font-size: 1.5rem; line-height: 1.5; position: relative; font-family: var(--serif); }
        .article-body blockquote::before { content: none; }
        .article-body h1, .article-body h2 { font-family: var(--serif); font-size: 1.7rem; font-weight: 700; margin: 3rem 0 1.25rem 0; letter-spacing: -0.01em; color: var(--ink); border-top: 1px solid var(--rule-light); padding-top: 2rem; }
        .article-body h3 { font-family: var(--serif); font-size: 1.3rem; font-weight: 700; margin: 2.25rem 0 1rem 0; }
        .article-body ul, .article-body ol { margin-bottom: 1.75rem; padding-left: 1.4rem; }
        .article-body li { margin-bottom: 0.7rem; }
        .article-body a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--accent); }
        .article-body a:hover { color: var(--accent); }
        .article-body strong { font-weight: 700; color: #000; }
        .article-body table { width: 100%; max-width: 100%; border-collapse: collapse; margin: 2rem 0; font-size: 0.92rem; font-family: var(--sans); display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .article-body thead { background: var(--paper-alt); }
        .article-body th { padding: 0.75rem 1rem; text-align: left; font-weight: 700; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink); border-bottom: 2px solid var(--ink); white-space: nowrap; }
        .article-body td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--rule-light); color: #333; white-space: nowrap; }
        .article-body tr:hover td { background: var(--paper-alt); }
        .article-body tbody tr:last-child td { border-bottom: 2px solid var(--ink); }

        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--ink); color: white; padding: 0.9rem 1.75rem; border-radius: 0; font-weight: 600; font-size: 0.85rem; letter-spacing: 0.02em; z-index: 1000; opacity: 0; transition: all 0.3s ease; font-family: var(--sans); pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
        .skeleton { background: linear-gradient(90deg, var(--skeleton-base) 25%, var(--skeleton-shimmer) 50%, var(--skeleton-base) 75%); background-size: 200% 100%; animation: shimmer 2s infinite linear; border-radius: 0; }
        footer { margin-top: 5rem; border-top: 3px solid var(--rule); padding: 2rem; text-align: center; color: var(--muted); font-size: 0.8rem; font-family: var(--mono); }

        @media (max-width: 768px) {
            .article-container { margin: 2rem auto; padding: 0 1.2rem; }
            h1.article-title { font-size: 2rem; margin-bottom: 1.25rem; }
            .article-img-wrapper { width: 100vw; margin-left: -1.2rem; margin-right: -1.2rem; width: calc(100% + 2.4rem); }
            .article-main-img { height: 42vh; min-height: 280px; }
            .article-actions { margin-bottom: 2.25rem; padding-bottom: 1.25rem; flex-wrap: wrap; }
            .article-note { margin-left: 0; max-width: 100%; text-align: left; }
            .article-body { font-size: 1.05rem; }
            .article-body table { font-size: 0.8rem; }
            .article-body th, .article-body td { padding: 0.5rem 0.6rem; }
            .article-meta { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
            footer { margin-top: 3rem; padding: 1.5rem 1rem; font-size: 0.75rem; }
            .widget-slider { margin: 2rem 0; padding: 1.5rem 0; }
            #nuitee-map-container { height: 300px; min-height: 300px; }
            .masthead-top-inner { padding: 0.4rem 1.2rem; }
            .nav-container { padding: 0 1.2rem; height: 66px; }
            .logo-img { height: 34px; }
        }
        @media (max-width: 480px) {
            #nuitee-map-container { height: 250px; min-height: 250px; }
        }
    </style>
</head>

            <div class="article-actions">
                <button class="action-btn" id="btn-share" aria-label="Partager l'article">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                    <span data-i18n="btn-share">Partager</span>
                </button>
                <button class="action-btn" id="btn-save" aria-label="Sauvegarder l'article">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                    <span id="text-save" data-i18n="btn-save">Sauvegarder</span>
                </button>
                <div class="article-note" data-i18n="team-note">
                    <strong>Travel Press</strong><br>Analyse &amp; rédaction par notre équipe éditoriale
                </div>
            </div>
            <div class="article-body" id="article-body"></div>
        </article>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <div id="footer-placeholder"></div>

    <script>
        (function() {
            'use strict';
            const SUPABASE_URL = 'https://ukbekfcjfcjcqrpxfpmq.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrYmVrZmNqZmNqY3FycHhmcG1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDk2NzcsImV4cCI6MjA4OTkyNTY3N30.KK3nxQOLTi3IZjYoRtrNC6mS_ixSsrZMI3J4WfxJVYU';
            const SITE_URL = 'https://press.luviaplace.com';
            const CONFIG = { DEFAULT_LANG: 'fr', STORAGE_PREFIX: 'luvia-', CACHE_DURATION: 5*60*1000 };

            const translations = {
                fr: { 
                    "skip-link":"Aller au contenu principal",
                    "masthead-edition":"Édition Internationale",
                    "nav-about":"À propos",
                    "nav-insurance":"Assurances",
                    "nav-tiqets":"Luvia+Tiqets",
                    "nav-gyg":"Luvia+GYG",
                    "nav-cta":"Nous contacter",
                    "nav-cta-mobile":"Nous contacter",
                    "lang-label":"Langue",
                    "error-not-found":"Article introuvable.",
                    "error-network":"Erreur de connexion.",
                    "error-invalid-id":"ID d'article invalide.",
                    "error-retry":"Reessayer",
                    "btn-share":"Partager",
                    "btn-save":"Sauvegarder",
                    "btn-saved":"Sauvegardé",
                    "toast-saved":"Article sauvegardé !",
                    "toast-removed":"Article retiré des favoris",
                    "toast-copied":"Lien copié !",
                    "widget-title":"Découvrez aussi",
                    "hotels-title":"Hébergements recommandés",
                    "map-title":"Carte des hôtels",
                    "team-note":"<strong>Travel Press</strong><br>Analyse & rédaction par notre équipe éditoriale"
                },
                en: { 
                    "skip-link":"Skip to main content",
                    "masthead-edition":"International Edition",
                    "nav-about":"About",
                    "nav-insurance":"Insurance",
                    "nav-tiqets":"Luvia+Tiqets",
                    "nav-gyg":"Luvia+GYG",
                    "nav-cta":"Get in touch",
                    "nav-cta-mobile":"Get in touch",
                    "lang-label":"Language",
                    "error-not-found":"Article not found.",
                    "error-network":"Connection error.",
                    "error-invalid-id":"Invalid article ID.",
                    "error-retry":"Retry",
                    "btn-share":"Share",
                    "btn-save":"Save",
                    "btn-saved":"Saved",
                    "toast-saved":"Article saved!",
                    "toast-removed":"Article removed from favorites",
                    "toast-copied":"Link copied!",
                    "widget-title":"Discover also",
                    "hotels-title":"Recommended accommodations",
                    "map-title":"Hotel map",
                    "team-note":"<strong>Travel Press</strong><br>Analysis & writing by our editorial team"
                }
            };

            const state = { currentLang: localStorage.getItem(CONFIG.STORAGE_PREFIX+'lang')||CONFIG.DEFAULT_LANG, cachedPostData: null, currentPostId: null, isLoading: false };
            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            function setMastheadDate(lang){ const el=document.getElementById('mastheadDate'); if(!el)return; const d=new Date(); el.textContent=d.toLocaleDateString(lang==='fr'?'fr-FR':'en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}); }
            function showToast(m,d=3000){ const t=document.getElementById('toast'); if(!t)return; t.textContent=m; t.classList.add('show'); clearTimeout(t.hideTimeout); t.hideTimeout=setTimeout(()=>t.classList.remove('show'),d); }
            function applyTranslations(lang){ 
                document.querySelectorAll('[data-i18n]').forEach(el=>{ 
                    const k=el.getAttribute('data-i18n'); 
                    if(translations[lang]&&translations[lang][k]){ 
                        if(k==='team-note'||k==='hero-welcome'||k==='hotels-title'||k==='map-title'){ 
                            el.innerHTML=translations[lang][k]; 
                        }else{ 
                            el.textContent=translations[lang][k]; 
                        } 
                    } 
                }); 
                const ls=document.getElementById('langSelect'),lsm=document.getElementById('langSelectMobile'); 
                if(ls)ls.value=lang; 
                if(lsm)lsm.value=lang; 
                document.documentElement.lang=lang; 
                setMastheadDate(lang);
                updateSaveButtonUI(); 
                // Re-init Nuitee widgets with new language
                initNuiteeWidgets();
            }
            function changeLanguage(lang){ if(lang===state.currentLang)return; state.currentLang=lang; localStorage.setItem(CONFIG.STORAGE_PREFIX+'lang',lang); applyTranslations(lang); if(state.cachedPostData) renderPost(state.cachedPostData); }
            function toggleMenu(){ const b=document.getElementById('burgerToggle'),m=document.getElementById('mobileMenu'); if(!m||!b)return; const o=m.classList.contains('open'); if(o){ m.classList.remove('open');b.classList.remove('open');b.setAttribute('aria-expanded','false');document.body.style.overflow=''; }else{ m.classList.add('open');b.classList.add('open');b.setAttribute('aria-expanded','true');document.body.style.overflow='hidden'; } }

            // ===== NUITE WIDGETS =====
            let nuiteeWidgetsInitialized = false;
            let nuiteeWidgetsInitializing = false;

            function initNuiteeWidgets() {
                if (nuiteeWidgetsInitializing) return;
                if (typeof LiteAPI === 'undefined') {
                    console.warn('LiteAPI SDK not loaded yet, retrying...');
                    setTimeout(initNuiteeWidgets, 500);
                    return;
                }

                nuiteeWidgetsInitializing = true;

                try {
                    // Initialize SDK
                    if (typeof LiteAPI !== 'undefined' && !LiteAPI._initialized) {
    LiteAPI.init({
        domain: 'luviaplace.com',
        deepLinkParams: 'language=' + state.currentLang + '&currency=EUR'
    });
    LiteAPI._initialized = true;
}

                    // Check if containers already exist
                    const hotelContainer = document.getElementById('nuitee-hotels-list');
                    const mapContainer = document.getElementById('nuitee-map-container');

                    if (hotelContainer && !hotelContainer.hasChildNodes()) {
                        LiteAPI.HotelsList.create({
                            selector: '#nuitee-hotels-list',
                            placeId: 'ChIJdd4hrwug2EcRmSrV3Vo6llI',
                            primaryColor: '#ac1118',
                            hasSearchBar: true,
                            rows: 2,
                            checkin: getDefaultCheckin(),
                            checkout: getDefaultCheckout(),
                            labelsOverride: {
                                searchAction: state.currentLang === 'fr' ? 'Rechercher' : 'Search',
                                placePlaceholderText: state.currentLang === 'fr' ? 'Rechercher une destination' : 'Search for a destination'
                            }
                        });
                    }

                    if (mapContainer && !mapContainer.hasChildNodes()) {
                        LiteAPI.Map.create({
                            selector: '#nuitee-map-container',
                            placeId: 'ChIJdd4hrwug2EcRmSrV3Vo6llI',
                            primaryColor: '#ac1118',
                            checkin: getDefaultCheckin(),
                            checkout: getDefaultCheckout(),
                            popup: {
                                titleColor: '#131313',
                                textColor: '#333333',
                                backgroundColor: '#ffffff'
                            }
                        });
                    }

                    nuiteeWidgetsInitialized = true;
                } catch (e) {
                    console.warn('Nuitee widgets initialization error:', e);
                } finally {
                    nuiteeWidgetsInitializing = false;
                }
            }

            function getDefaultCheckin() {
                const d = new Date();
                d.setDate(d.getDate() + 1);
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return year + '-' + month + '-' + day;
            }

            function getDefaultCheckout() {
                const d = new Date();
                d.setDate(d.getDate() + 2);
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return year + '-' + month + '-' + day;
            }

            // ===== WIDGET SLIDER =====
            function createWidgetSlider() {
                const sliderContainer = document.createElement('div');
                sliderContainer.className = 'widget-slider';
                sliderContainer.id = 'widget-slider-container';

                const title = document.createElement('p');
                title.className = 'widget-slider-title';
                title.setAttribute('data-i18n', 'widget-title');
                title.textContent = translations[state.currentLang]['widget-title'] || 'Découvrez aussi';
                sliderContainer.appendChild(title);

                // Navigation dots
                const nav = document.createElement('div');
                nav.className = 'widget-nav';
                nav.innerHTML = `
                    <button class="widget-dot active" onclick="switchWidget(0)"></button>
                    <button class="widget-dot" onclick="switchWidget(1)"></button>
                    <button class="widget-dot" onclick="switchWidget(2)"></button>
                    <button class="widget-dot" onclick="switchWidget(3)"></button>
                `;
                sliderContainer.appendChild(nav);

                // Slide 0: Tiqets
                const slide0 = document.createElement('div');
                slide0.className = 'widget-slide active';
                slide0.id = 'widget-slide-0';
                slide0.innerHTML = `<div data-tiqets-widget="discovery" data-cards-layout="responsive" data-content-type="exhibition" data-item_count="4" data-destination-type="venue" data-destination-id="124297" data-slug-ids="" data-partner="luvia_travel_llc-187826" data-tq-campaign="Louvre experience"></div>`;
                sliderContainer.appendChild(slide0);

                // Slide 1: GetYourGuide
                const slide1 = document.createElement('div');
                slide1.className = 'widget-slide';
                slide1.id = 'widget-slide-1';
                slide1.innerHTML = `<div data-gyg-widget="auto" data-gyg-partner-id="TNCQUZX" data-gyg-cmp="Namibie : voyage de 3 jours tout compris à Sossusvlei"></div>`;
                sliderContainer.appendChild(slide1);

                // Slide 2: Nuitee Hotels List
                const slide2 = document.createElement('div');
                slide2.className = 'widget-slide';
                slide2.id = 'widget-slide-2';
                slide2.innerHTML = `
                    <div class="nuitee-widget-container">
                        <h3 data-i18n="hotels-title">${translations[state.currentLang]['hotels-title'] || 'Hébergements recommandés'}</h3>
                        <div id="nuitee-hotels-list"></div>
                    </div>
                `;
                sliderContainer.appendChild(slide2);

                // Slide 3: Nuitee Map
                const slide3 = document.createElement('div');
                slide3.className = 'widget-slide';
                slide3.id = 'widget-slide-3';
                slide3.innerHTML = `
                    <div class="nuitee-widget-container">
                        <h3 data-i18n="map-title">${translations[state.currentLang]['map-title'] || 'Carte des hôtels'}</h3>
                        <div id="nuitee-map-container"></div>
                    </div>
                `;
                sliderContainer.appendChild(slide3);

                return sliderContainer;
            }

            let currentWidget = 0;
            window.switchWidget = function(index) {
                document.querySelectorAll('.widget-slide').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.widget-dot').forEach(d => d.classList.remove('active'));
                const slide = document.getElementById('widget-slide-' + index);
                if (slide) slide.classList.add('active');
                const dots = document.querySelectorAll('.widget-dot');
                if (dots[index]) dots[index].classList.add('active');
                currentWidget = index;

                // Initialize Nuitee widgets when their slides become active
                if (index === 2 || index === 3) {
                    setTimeout(initNuiteeWidgets, 300);
                }
            };

            // Auto-rotate widgets
            let widgetInterval = null;
            function startWidgetRotation() {
                if (widgetInterval) clearInterval(widgetInterval);
                widgetInterval = setInterval(() => {
                    const container = document.getElementById('widget-slider-container');
                    if (container && container.style.display !== 'none') {
                        const total = document.querySelectorAll('.widget-slide').length;
                        const next = (currentWidget + 1) % total;
                        switchWidget(next);
                    }
                }, 8000);
            }

            // ===== ARTICLE FUNCTIONS =====
            async function fetchPost(retry=0){ 
                if(state.isLoading)return; 
                state.isLoading=true; 
                applyTranslations(state.currentLang); 
                const p=new URLSearchParams(window.location.search),id=p.get('id'); 
                if(!id||!/^[a-zA-Z0-9-]+$/.test(id)){ showError('error-invalid-id');state.isLoading=false;return; } 
                state.currentPostId=id; 
                try{ 
                    const {data:post,error}=await supabaseClient.from('posts').select('*').eq('id',state.currentPostId).single(); 
                    if(error)throw error; 
                    if(!post)throw new Error('Article non trouve'); 
                    state.cachedPostData=post; 
                    renderPost(post); 
                    setupActionButtons(); 
                }catch(e){ 
                    console.error('Erreur:',e); 
                    if(retry<2){ 
                        setTimeout(()=>fetchPost(retry+1),1000*(retry+1)); 
                        state.isLoading=false;
                        return; 
                    } 
                    showError('error-network'); 
                }finally{ 
                    state.isLoading=false; 
                } 
            }

            function renderPost(post){ 
                try{ 
                    const isEN=state.currentLang==='en'; 
                    const title=isEN&&post.title_en?post.title_en:post.title; 
                    const cat=isEN&&post.category_en?post.category_en:(post.category||'News'); 
                    const content=isEN&&post.content_en?post.content_en:post.content; 
                    document.title=title+' - Travel Press'; 
                    document.getElementById('article-title').textContent=title; 
                    document.getElementById('article-cat').textContent=cat;
                    
                    const imgUrls = post.image_url ? post.image_url.split('||').map(u => u.trim()).filter(u => u) : ['https://images.unsplash.com/photo-1547471080-7cc2caa01a7e?q=80&w=1200'];
                    const imgSlider = document.getElementById('article-img-slider');
                    const imgDots = document.getElementById('img-dots');
                    const arrowLeft = document.getElementById('img-arrow-left');
                    const arrowRight = document.getElementById('img-arrow-right');
                    
                    if (imgSlider && imgDots) {
                        imgSlider.innerHTML = imgUrls.map((url, i) => `<img class="article-main-img" src="${url}" alt="${title} - Image ${i+1}" loading="${i===0?'eager':'lazy'}">`).join('');
                        
                        if (imgUrls.length > 1) {
                            imgDots.classList.add('visible');
                            if (arrowLeft) arrowLeft.classList.add('visible');
                            if (arrowRight) arrowRight.classList.add('visible');
                            imgDots.innerHTML = imgUrls.map((_, i) => `<span class="img-dot${i===0?' active':''}" onclick="goToImg(${i})"></span>`).join('');
                        } else {
                            imgDots.classList.remove('visible');
                            if (arrowLeft) arrowLeft.classList.remove('visible');
                            if (arrowRight) arrowRight.classList.remove('visible');
                            imgDots.innerHTML = '';
                        }
                        imgSlider.scrollLeft = 0; 
                        currentImgIndex = 0;
                    }
                    
                    document.getElementById('article-date').textContent=new Date(post.created_at).toLocaleDateString(isEN?'en-US':'fr-FR',{month:'long',day:'numeric',year:'numeric'});
                    const metaDesc=document.querySelector('meta[name="description"]'); 
                    if(metaDesc) metaDesc.setAttribute('content',(post.excerpt||title).substring(0,160));
                    const canonical=document.querySelector('link[rel="canonical"]'); 
                    if(canonical) canonical.href=SITE_URL+'/post.html?id='+post.id;
                    const sd=document.getElementById('structured-data'); 
                    if(sd){ 
                        sd.textContent=JSON.stringify({
                            "@context":"https://schema.org",
                            "@type":"NewsArticle",
                            "headline":title,
                            "image":imgUrls[0],
                            "datePublished":post.created_at,
                            "dateModified":post.created_at,
                            "author":{"@type":"Organization","name":"Travel Press"},
                            "publisher":{"@type":"Organization","name":"Travel Press","logo":{"@type":"ImageObject","url":"https://press.luviaplace.com/logo.png"}}
                        }); 
                    }
                    
                    const raw=marked.parse(content||''); 
                    const clean=DOMPurify.sanitize(raw,{
                        ALLOWED_TAGS:['p','br','strong','em','u','h1','h2','h3','h4','h5','h6','ul','ol','li','a','img','blockquote','code','pre','span','div','table','thead','tbody','tr','td','th'],
                        ALLOWED_ATTR:['href','src','alt','class','target','rel','width','height']
                    }); 
                    
                    const articleBody = document.getElementById('article-body');
                    articleBody.innerHTML = clean;
                    
                    // Inject widget slider after 3rd paragraph
                    const paragraphs = articleBody.querySelectorAll('p');
                    const widgetSlider = createWidgetSlider();
                    
                    if (paragraphs.length >= 3) {
                        paragraphs[2].parentNode.insertBefore(widgetSlider, paragraphs[2].nextSibling);
                    } else if (paragraphs.length >= 1) {
                        const last = paragraphs[paragraphs.length - 1];
                        last.parentNode.insertBefore(widgetSlider, last.nextSibling);
                    } else {
                        articleBody.appendChild(widgetSlider);
                    }
                    
                    document.getElementById('skeleton-view').style.display='none'; 
                    document.getElementById('article-view').style.display='block'; 
                    document.getElementById('error-container').style.display='none';
                    
                    // Init widgets after render
                    setTimeout(() => {
                        initNuiteeWidgets();
                        // Trigger Tiqets and GYG widgets
                        if (window.Tiqets) window.Tiqets.load();
                        //if (window.GYG) window.GYG.init();
                        startWidgetRotation();
                    }, 1000);
                    
                    updateSaveButtonUI(); 
                }catch(e){ 
                    console.error('Erreur de rendu:',e); 
                    showError('error-not-found'); 
                } 
            }

            function showError(t='error-not-found'){ 
                document.getElementById('skeleton-view').style.display='none'; 
                document.getElementById('article-view').style.display='none'; 
                document.getElementById('error-container').style.display='block'; 
                const m=document.getElementById('error-message'); 
                if(m&&translations[state.currentLang]?.[t]) m.textContent=translations[state.currentLang][t]; 
            }

            function setupActionButtons(){ 
                document.getElementById('btn-share')?.addEventListener('click',handleShare); 
                document.getElementById('btn-save')?.addEventListener('click',toggleSavePost); 
                updateSaveButtonUI(); 
            }

            async function handleShare(){ 
                const url=state.currentPostId?SITE_URL+'/articles/'+state.currentPostId+'.html':window.location.href; 
                if(navigator.share){ 
                    try{await navigator.share({title:document.title,url:url});}catch(e){if(e.name!=='AbortError')copyToClipboard(url);} 
                }else{copyToClipboard(url);} 
            }

            function copyToClipboard(url){ 
                url=url||window.location.href; 
                navigator.clipboard.writeText(url).then(()=>showToast(translations[state.currentLang]['toast-copied'])).catch(()=>{ 
                    const t=document.createElement('textarea');
                    t.value=url;
                    t.style.position='fixed';
                    t.style.opacity='0';
                    document.body.appendChild(t);
                    t.select();
                    document.execCommand('copy');
                    document.body.removeChild(t);
                    showToast(translations[state.currentLang]['toast-copied']); 
                }); 
            }

            function toggleSavePost(){ 
                if(!state.currentPostId)return; 
                let s=JSON.parse(localStorage.getItem(CONFIG.STORAGE_PREFIX+'saved-posts')||'[]'); 
                const i=s.indexOf(state.currentPostId); 
                if(i>-1){s.splice(i,1);showToast(translations[state.currentLang]['toast-removed']);}else{s.push(state.currentPostId);showToast(translations[state.currentLang]['toast-saved']);} 
                localStorage.setItem(CONFIG.STORAGE_PREFIX+'saved-posts',JSON.stringify(s));
                updateSaveButtonUI(); 
            }

            function updateSaveButtonUI(){ 
                if(!state.currentPostId)return; 
                const b=document.getElementById('btn-save'),t=document.getElementById('text-save'); 
                if(!b||!t)return; 
                const s=JSON.parse(localStorage.getItem(CONFIG.STORAGE_PREFIX+'saved-posts')||'[]'); 
                if(s.includes(state.currentPostId)){b.classList.add('saved');t.textContent=translations[state.currentLang]['btn-saved'];b.setAttribute('aria-pressed','true');}else{b.classList.remove('saved');t.textContent=translations[state.currentLang]['btn-save'];b.setAttribute('aria-pressed','false');} 
            }

            // Image Slider
            let currentImgIndex = 0;
            window.slideImg = function(dir) { 
                const sl=document.getElementById('article-img-slider'); 
                const imgs=sl.querySelectorAll('.article-main-img'); 
                if(!imgs.length)return; 
                currentImgIndex=Math.max(0,Math.min(currentImgIndex+dir,imgs.length-1)); 
                imgs[currentImgIndex].scrollIntoView({behavior:'smooth',block:'nearest'}); 
                updateImgDots(); 
            };
            window.goToImg = function(idx) { 
                const sl=document.getElementById('article-img-slider'); 
                const imgs=sl.querySelectorAll('.article-main-img'); 
                if(!imgs.length)return; 
                currentImgIndex=idx; 
                imgs[idx].scrollIntoView({behavior:'smooth',block:'nearest'}); 
                updateImgDots(); 
            };
            function updateImgDots(){ 
                document.querySelectorAll('.img-dot').forEach((d,i)=>d.classList.toggle('active',i===currentImgIndex)); 
            }

            // Event Listeners
            document.getElementById('burgerToggle')?.addEventListener('click',toggleMenu);
            document.querySelectorAll('.nav-mobile a').forEach(l=>l.addEventListener('click',()=>{ 
                if(document.getElementById('mobileMenu')?.classList.contains('open'))toggleMenu(); 
            }));
            document.getElementById('langSelect')?.addEventListener('change',e=>changeLanguage(e.target.value));
            document.getElementById('langSelectMobile')?.addEventListener('change',e=>{ 
                document.getElementById('langSelect').value=e.target.value;
                changeLanguage(e.target.value); 
            });
            document.addEventListener('keydown',e=>{ 
                if(e.key==='Escape'&&document.getElementById('mobileMenu')?.classList.contains('open'))toggleMenu(); 
            });
            document.addEventListener('click',e=>{ 
                const m=document.getElementById('mobileMenu'),b=document.getElementById('burgerToggle'); 
                if(m?.classList.contains('open')&&!m.contains(e.target)&&!b.contains(e.target))toggleMenu(); 
            });
            
            // Init
            window.addEventListener('DOMContentLoaded',()=>{ 
                fetchPost(); 
            });

            // Expose functions globally
            window.changeLanguage = changeLanguage;
            window.toggleMenu = toggleMenu;
            window.switchWidget = switchWidget;

        })();

        fetch('footer.html').then(r=>r.text()).then(d=>{ 
            document.getElementById('footer-placeholder').innerHTML=d; 
        }).catch(()=>{ 
            document.getElementById('footer-placeholder').innerHTML='<p style="text-align:center;padding:2rem;color:#999;">© 2024 Travel Press</p>'; 
        });
    </script>
</body>
