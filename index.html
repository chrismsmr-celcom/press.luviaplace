    <style>
        /* ===== RESET & BASE ===== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            color: #131313;
            -webkit-font-smoothing: antialiased;
            line-height: 1.6;
        }

        :root {
            --max-width: 1220px;
            --ink: #131313;
            --paper: #ffffff;
            --paper-alt: #f4f3ef;
            --accent: #ac1118;
            --rule: #131313;
            --rule-light: #dedad0;
            --text-muted: #6b6963;
            --skeleton-base: #f2f1ed;
            --skeleton-shimmer: #e6e3da;
            --serif: 'Source Serif 4', Georgia, 'Times New Roman', serif;
            --sans: 'Inter', -apple-system, sans-serif;
            --mono: 'IBM Plex Mono', 'Courier New', monospace;
        }

        a { text-decoration: none; color: inherit; }

        /* ===== MASTHEAD ===== */
        header { background: var(--paper); position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--rule); }
        .masthead-top { border-bottom: 1px solid var(--rule-light); font-family: var(--mono); font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.03em; }
        .masthead-top-inner { max-width: var(--max-width); margin: 0 auto; padding: 0.45rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .masthead-top .dateline { text-transform: uppercase; }
        .nav-container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 2rem;
            height: 88px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-wrap { display: flex; align-items: center; height: 100%; }
        .logo-img { height: 50px; width: auto; object-fit: contain; filter: grayscale(1) contrast(1.3) brightness(0.2); }

        nav.nav-desktop { display: flex; gap: 2rem; align-items: center; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
        nav.nav-desktop a { color: #131313; transition: color 0.2s; }
        nav.nav-desktop a:hover { color: var(--accent); }
        .cta-main-site { background: var(--ink); color: #fff !important; padding: 0.55rem 1.2rem; border-radius: 0; font-weight: 700; font-size: 0.7rem; letter-spacing: 0.06em; transition: background 0.2s; }
        .cta-main-site:hover { background: var(--accent); }

        .lang-dropdown { background: #fff; border: 1px solid var(--ink); padding: 0.3rem 0.6rem; border-radius: 0; font-size: 0.7rem; font-weight: 700; font-family: var(--mono); cursor: pointer; outline: none; letter-spacing: 0.05em; }

        /* Mobile nav */
        .burger-menu { display: none; background: none; border: none; cursor: pointer; padding: 0.4rem; z-index: 110; }
        .burger-menu span { display: block; width: 22px; height: 2px; background: #131313; margin: 5px 0; transition: 0.3s ease; }
        .nav-mobile {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: #fff;
            z-index: 105;
            padding: 5rem 2rem 2rem;
            flex-direction: column;
            gap: 1.5rem;
        }
        .nav-mobile a { font-size: 1.15rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; border-bottom: 1px solid var(--rule-light); padding-bottom: 0.75rem; }
        .nav-mobile .cta-mobile-site { color: var(--accent); border: none; }
        .nav-mobile.open { display: flex; }
        .burger-menu.open span:nth-child(1) { transform: rotate(-45deg) translate(-5px, 5px); }
        .burger-menu.open span:nth-child(2) { opacity: 0; }
        .burger-menu.open span:nth-child(3) { transform: rotate(45deg) translate(-5px, -5px); }

        @media (max-width: 992px) {
            nav.nav-desktop { display: none; }
            .burger-menu { display: block; }
        }

        /* ===== TICKER (WIRE) ===== */
        .ticker-bar {
            background: var(--ink);
            border-bottom: 3px solid var(--accent);
            padding: 0.55rem 2rem;
            font-size: 0.8rem;
            overflow: hidden;
        }
        .ticker-container {
            max-width: var(--max-width);
            margin: 0 auto;
            display: flex;
            gap: 1.1rem;
            align-items: center;
        }
        .ticker-badge {
            background: var(--accent);
            color: #fff;
            padding: 0.2rem 0.7rem;
            font-weight: 700;
            font-size: 0.65rem;
            font-family: var(--mono);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-radius: 0;
            flex-shrink: 0;
        }
        .ticker-badge::before { content: '● '; }
        .ticker-scroll-wrap {
            overflow: hidden;
            flex: 1;
            position: relative;
            height: 1.4rem;
        }
        .ticker-text {
            display: inline-block;
            white-space: nowrap;
            animation: ticker-scroll 80s linear infinite;
            padding-left: 100%;
            font-weight: 450;
            font-family: var(--mono);
            font-size: 0.78rem;
            color: #f2f0ea;
        }
        .ticker-text:hover { animation-play-state: paused; }
        .ticker-separator { margin: 0 1.4rem; color: #8a8880; }
        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* ===== HERO (FRONT PAGE) ===== */
        .hero-section {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 2rem;
        }
        .hero-front {
            display: grid;
            grid-template-columns: 1.65fr 1fr;
            gap: 2.5rem;
            padding: 2.5rem 0 2rem;
            border-bottom: 3px solid var(--rule);
        }
        .hero-lead { display: block; }
        .hero-lead-img-wrap { width: 100%; height: 420px; overflow: hidden; margin-bottom: 1rem; background: #eee; }
        .hero-lead-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .hero-kicker {
            font-family: var(--mono);
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 0.6rem;
            display: block;
        }
        .hero-lead h2 {
            font-family: var(--serif);
            font-size: 2.6rem;
            font-weight: 700;
            line-height: 1.08;
            letter-spacing: -0.01em;
            margin-bottom: 0.85rem;
            color: var(--ink);
        }
        .hero-lead p.dek {
            font-family: var(--serif);
            font-size: 1.15rem;
            color: #333;
            line-height: 1.5;
            max-width: 92%;
        }
        .hero-lead .hero-lead-date { font-family: var(--mono); font-size: 0.72rem; color: var(--text-muted); margin-top: 0.85rem; text-transform: uppercase; }

        .hero-sidebar { display: flex; flex-direction: column; }
        .hero-sidebar-title {
            font-family: var(--mono);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border-bottom: 2px solid var(--ink);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
            color: var(--ink);
        }
        .hero-sidebar-note {
            font-family: var(--serif);
            font-style: italic;
            font-size: 1rem;
            line-height: 1.55;
            color: #333;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid var(--rule-light);
            margin-bottom: 1.25rem;
        }
        .hero-sidebar-list { list-style: none; }
        .hero-sidebar-item { display: flex; gap: 0.9rem; padding: 0.9rem 0; border-bottom: 1px solid var(--rule-light); }
        .hero-sidebar-item:last-child { border-bottom: none; }
        .hero-sidebar-num { font-family: var(--serif); font-size: 1.6rem; font-weight: 700; color: var(--rule-light); line-height: 1; flex-shrink: 0; }
        .hero-sidebar-item a { font-family: var(--serif); font-size: 0.98rem; font-weight: 600; line-height: 1.3; color: var(--ink); }
        .hero-sidebar-item a:hover { color: var(--accent); }

        /* ===== FILTERS ===== */
        .filter-section {
            max-width: var(--max-width);
            margin: 3rem auto 1.5rem;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--rule-light);
            padding-bottom: 0.9rem;
        }
        .filter-section h2 {
            font-family: var(--serif);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }
        .filter-controls {
            display: flex;
            gap: 0.75rem;
        }
        .search-input {
            padding: 0.5rem 1rem;
            border: 1px solid var(--ink);
            border-radius: 0;
            font-size: 0.8rem;
            width: 210px;
            outline: none;
            font-family: var(--sans);
            background: #fff;
            transition: border 0.2s;
        }
        .search-input:focus { border-color: var(--accent); }
        .category-select {
            padding: 0.5rem 1.1rem;
            border: 1px solid var(--ink);
            border-radius: 0;
            font-size: 0.8rem;
            font-family: var(--sans);
            background: #fff;
            cursor: pointer;
            outline: none;
        }

        /* ===== GRID ===== */
        .journal-grid {
            max-width: var(--max-width);
            margin: 0 auto 4rem;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
            border-top: 1px solid var(--rule-light);
        }
        .article-card {
            background: #fff;
            display: flex;
            flex-direction: column;
            padding: 1.75rem 1.75rem 1.75rem 0;
            border-bottom: 1px solid var(--rule-light);
            border-right: 1px solid var(--rule-light);
        }
        .journal-grid .article-card:nth-child(3n) { border-right: none; }
        .journal-grid .article-card:nth-child(3n+1) { padding-left: 0; }
        .journal-grid .article-card:nth-child(3n+2) { padding-left: 1.75rem; }

        .article-img-wrap {
            width: 100%;
            height: 190px;
            border-radius: 0;
            overflow: hidden;
            margin-bottom: 0.9rem;
            background: #f0f0f0;
            position: relative;
        }
        .article-img-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            height: 100%;
            cursor: grab;
        }
        .article-img-slider::-webkit-scrollbar { display: none; }
        .article-img-slider:active { cursor: grabbing; }
        .article-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            flex-shrink: 0;
            scroll-snap-align: start;
        }

        .card-controls {
            position: absolute;
            bottom: 8px;
            left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8px;
            z-index: 5;
        }
        .card-dots { display: flex; gap: 4px; }
        .card-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            transition: all 0.3s;
        }
        .card-dot.active { background: #fff; width: 14px; border-radius: 10px; }
        .card-arrows { display: flex; gap: 4px; }
        .card-arrow {
            width: 30px; height: 30px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            border: none;
            cursor: pointer;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #131313;
            transition: background 0.2s;
        }
        .card-arrow:hover { background: #fff; }
        .card-controls.hidden { display: none; }

        .article-info .meta-row {
            display: flex;
            align-items: baseline;
            gap: 0.7rem;
            margin-bottom: 0.45rem;
        }
        .article-info .meta-row .tag-badge {
            background: transparent;
            color: var(--accent);
            font-family: var(--mono);
            font-size: 0.65rem;
            font-weight: 700;
            padding: 0;
            border-radius: 0;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .article-info .meta-row .date {
            font-family: var(--mono);
            font-size: 0.68rem;
            color: var(--text-muted);
        }
        .article-title {
            font-family: var(--serif);
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.32;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            letter-spacing: -0.005em;
        }
        .article-card:hover .article-title { color: var(--accent); }

        /* ===== SKELETON ===== */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, var(--skeleton-base) 25%, var(--skeleton-shimmer) 50%, var(--skeleton-base) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
            border-radius: 0;
        }
        .skeleton-view { display: block; }
        .real-view { display: none; opacity: 0; transition: opacity 0.4s; }
        .real-view.ready { display: block; opacity: 1; }

        footer { font-family: var(--mono); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 992px) {
            .hero-front { grid-template-columns: 1fr; }
            .hero-lead-img-wrap { height: 320px; }
            .hero-lead h2 { font-size: 2.1rem; }
            .journal-grid { grid-template-columns: repeat(2, 1fr); }
            .journal-grid .article-card:nth-child(3n) { border-right: 1px solid var(--rule-light); }
            .journal-grid .article-card:nth-child(2n) { border-right: none; }
            .journal-grid .article-card:nth-child(3n+1), .journal-grid .article-card:nth-child(3n+2) { padding-left: 1.75rem; }
            .journal-grid .article-card:nth-child(2n+1) { padding-left: 0; }
        }

        @media (max-width: 768px) {
            .hero-section { padding: 0 1.2rem; }
            .hero-front { padding: 1.75rem 0 1.5rem; gap: 1.75rem; }
            .hero-lead-img-wrap { height: 240px; }
            .hero-lead h2 { font-size: 1.7rem; }
            .hero-lead p.dek { max-width: 100%; font-size: 1rem; }
            .filter-section {
                margin-top: 2rem;
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
            }
            .filter-controls { flex-direction: column; width: 100%; }
            .search-input { width: 100%; }
            .journal-grid { grid-template-columns: 1fr; padding: 0 1.2rem; }
            .journal-grid .article-card { border-right: none !important; padding-left: 0 !important; }
            .ticker-bar { padding: 0.45rem 1rem; }
            .ticker-container { gap: 0.7rem; }
            .masthead-top-inner { padding: 0.4rem 1.2rem; }
            .nav-container { padding: 0 1.2rem; height: 68px; }
            .logo-img { height: 36px; }
        }
    </style>
</head>

        <div class="journal-grid" style="border-top:none;">
            <div class="article-card" style="border:none;"><div class="skeleton" style="width:100%;height:190px"></div></div>
            <div class="article-card" style="border:none;"><div class="skeleton" style="width:100%;height:190px"></div></div>
            <div class="article-card" style="border:none;"><div class="skeleton" style="width:100%;height:190px"></div></div>
        </div>
    </div>

    <!-- ===== REAL CONTENT ===== -->
    <div id="real-view" class="real-view">
        <div id="hero-container"></div>
        <div class="filter-section">
            <h2 id="grid-title-count" data-i18n="latest-news">Latest News</h2>
            <div class="filter-controls">
                <input type="text" id="searchInput" class="search-input" oninput="filterPosts()" placeholder="Search articles..." data-i18n-placeholder="search-placeholder" />
                <select class="category-select" id="categoryFilter" onchange="filterPosts()">
                    <option value="all" data-i18n="cat-all">Categories</option>
                </select>
            </div>
        </div>
        <main class="journal-grid" id="posts-grid-container"></main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        // ===== CONFIG =====
        const SUPABASE_URL = 'https://ukbekfcjfcjcqrpxfpmq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrYmVrZmNqZmNqY3FycHhmcG1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDk2NzcsImV4cCI6MjA4OTkyNTY3N30.KK3nxQOLTi3IZjYoRtrNC6mS_ixSsrZMI3J4WfxJVYU';
        const NEWS_API_KEY = 'pub_1ea29e57ce7b48fb8cfecae994edc791';
        const NEWS_API_URL = 'https://newsdata.io/api/1/latest';
        const REALTIME_DEBOUNCE_MS = 30000;

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ===== TRANSLATIONS =====
        const translations = {
            fr: {
                "masthead-edition": "Édition Internationale",
                "nav-about": "À propos",
                "nav-insurance": "Assurances",
                "nav-tiqets": "Luvia+Tiqets",
                "nav-gyg": "Luvia+GYG",
                "nav-cta": "Nous contacter",
                "nav-cta-mobile": "Nous contacter →",
                "lang-label": "Langue",
                "ticker-badge": "Dernières minutes",
                "loading-news": "Chargement des actualités...",
                "latest-news": "Dernières actualités Travel Press",
                "search-placeholder": "Rechercher un article...",
                "cat-all": "Toutes les catégories",
                "hero-kicker": "À la une",
                "hero-sidebar-title": "Dans cette édition",
                "hero-desc": "Suivez en temps réel les annonces officielles, communiqués de presse, analyses de luxe et carnets de bord exclusifs.",
                "ticker-no-news": "Aucune actualité travel disponible pour le moment."
            },
            en: {
                "masthead-edition": "International Edition",
                "nav-about": "About",
                "nav-insurance": "Insurance",
                "nav-tiqets": "Luvia+Tiqets",
                "nav-gyg": "Luvia+GYG",
                "nav-cta": "Get in touch",
                "nav-cta-mobile": "Get in touch →",
                "lang-label": "Language",
                "ticker-badge": "Breaking News",
                "loading-news": "Loading latest news...",
                "latest-news": "Latest News by Travel Press",
                "search-placeholder": "Search articles...",
                "cat-all": "Categories",
                "hero-kicker": "Front page",
                "hero-sidebar-title": "In this edition",
                "hero-desc": "Stay up to date on current company announcements, press releases, luxury insights, and reports.",
                "ticker-no-news": "No travel news available at the moment."
            }
        };

        let currentLang = localStorage.getItem('luvia-lang') || 'fr';
        let allPostsData = [];
        let featuredPostId = null;

        // ===== I18N =====
        function setMastheadDate() {
            const el = document.getElementById('mastheadDate');
            if (!el) return;
            const d = new Date();
            el.textContent = d.toLocaleDateString(currentLang === 'fr' ? 'fr-FR' : 'en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
        }
        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const k = el.getAttribute('data-i18n');
                if (translations[currentLang]?.[k]) el.innerHTML = translations[currentLang][k];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const k = el.getAttribute('data-i18n-placeholder');
                if (translations[currentLang]?.[k]) el.setAttribute('placeholder', translations[currentLang][k]);
            });
            document.getElementById('langSelect').value = currentLang;
            document.getElementById('langSelectMobile').value = currentLang;
            setMastheadDate();
        }

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('luvia-lang', lang);
            applyTranslations();
            if (allPostsData.length) renderDynamicContent(allPostsData);
        }

        function toggleMenu() {
            document.getElementById('burgerToggle').classList.toggle('open');
            document.getElementById('mobileMenu').classList.toggle('open');
        }

        // ===== TICKER =====
        async function fetchLatestNews() {
            const tickerHeadline = document.getElementById('ticker-headline');
            try {
                const res = await fetch(`${NEWS_API_URL}?apikey=${NEWS_API_KEY}&q=travel&language=fr,en&size=10`);
                if (!res.ok) throw new Error('API error');
                const data = await res.json();
                if (data.status === 'success' && data.results?.length) {
                    const headlines = data.results.filter(a => a.title?.length > 10).map(a => a.title).slice(0, 10);
                    if (headlines.length) {
                        tickerHeadline.innerHTML = headlines.join(' <span class="ticker-separator">|</span> ') + ' <span class="ticker-separator">|</span> ' + headlines.join(' <span class="ticker-separator">|</span> ');
                    } else {
                        tickerHeadline.innerHTML = translations[currentLang]['ticker-no-news'];
                    }
                } else {
                    tickerHeadline.innerHTML = translations[currentLang]['ticker-no-news'];
                }
            } catch {
                tickerHeadline.innerHTML = translations[currentLang]['ticker-no-news'];
            }
        }

        function startTickerRefresh() {
            fetchLatestNews();
            setInterval(fetchLatestNews, 5 * 60 * 1000);
        }

        // ===== REALTIME =====
        let realtimeDebounceTimer = null;
        function setupRealtime() {
            supabaseClient.channel('posts-realtime')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => {
                    if (realtimeDebounceTimer) clearTimeout(realtimeDebounceTimer);
                    realtimeDebounceTimer = setTimeout(() => {
                        refreshArticles();
                        realtimeDebounceTimer = null;
                    }, REALTIME_DEBOUNCE_MS);
                })
                .subscribe();
        }

        async function refreshArticles() {
            const { data: posts } = await supabaseClient.from('posts').select('*').order('created_at', { ascending: false });
            if (!posts?.length) return;
            allPostsData = posts;
            renderDynamicContent(posts);
            updateCategoryFilter(posts);
        }

        // ===== RENDER =====
        function renderDynamicContent(posts) {
            if (!posts.length) return;
            const featured = posts.find(p => p.is_featured) || posts[0];
            featuredPostId = featured.id;

            const sidebarPosts = posts.filter(p => p.id !== featured.id).slice(0, 4);
            const dateLocale = currentLang === 'fr' ? 'fr-FR' : 'en-US';

            const heroContainer = document.getElementById('hero-container');
            heroContainer.innerHTML = `
                <section class="hero-section">
                    <div class="hero-front">
                        <a href="post.html?id=${featured.id}" class="hero-lead">
                            <div class="hero-lead-img-wrap">
                                <img class="hero-lead-img" src="${(featured.image_url || 'https://images.unsplash.com/photo-1547471080-7cc2caa01a7e?q=80&w=1200').split('||')[0].trim()}" alt="${featured.title}" />
                            </div>
                            <span class="hero-kicker">${translations[currentLang]['hero-kicker']} — ${featured.category || 'Press'}</span>
                            <h2>${featured.title}</h2>
                            ${featured.excerpt ? `<p class="dek">${featured.excerpt}</p>` : ''}
                            <div class="hero-lead-date">${new Date(featured.created_at).toLocaleDateString(dateLocale, { month: 'long', day: 'numeric', year: 'numeric' })}</div>
                        </a>
                        <aside class="hero-sidebar">
                            <div class="hero-sidebar-title">${translations[currentLang]['hero-sidebar-title']}</div>
                            <p class="hero-sidebar-note">${translations[currentLang]['hero-desc']}</p>
                            <ul class="hero-sidebar-list">
                                ${sidebarPosts.map((p, i) => `
                                    <li class="hero-sidebar-item">
                                        <span class="hero-sidebar-num">${String(i + 1).padStart(2, '0')}</span>
                                        <a href="post.html?id=${p.id}">${p.title}</a>
                                    </li>
                                `).join('')}
                            </ul>
                        </aside>
                    </div>
                </section>
            `;
            buildGrid(posts);
            document.getElementById('skeleton-view').style.display = 'none';
            document.getElementById('real-view').classList.add('ready');
        }

        function buildGrid(postsList) {
            const normalPosts = postsList.filter(p => p.id !== featuredPostId);
            const gridTitle = document.getElementById('grid-title-count');
            gridTitle.innerText = currentLang === 'fr'
                ? `Dernières actualités Travel Press (${normalPosts.length})`
                : `Latest News by Travel Press (${normalPosts.length})`;

            const grid = document.getElementById('posts-grid-container');
            if (!normalPosts.length) {
                grid.innerHTML = `<div style="grid-column:span 3;color:var(--text-muted);padding:2rem 0">${currentLang === 'fr' ? 'Aucun autre article.' : 'No other articles.'}</div>`;
                return;
            }

            grid.innerHTML = normalPosts.map(post => {
                const imgUrls = post.image_url ? post.image_url.split('||').map(u => u.trim()).filter(Boolean) : ['https://images.unsplash.com/photo-1488646953014-85cb44e25828?q=80&w=600'];
                const hasMultiple = imgUrls.length > 1;

                setTimeout(() => {
                    if (hasMultiple) {
                        const slider = document.getElementById('slider-' + post.id);
                        if (slider) {
                            let currentIdx = 0;
                            const dots = slider.parentElement.querySelectorAll('.card-dot');
                            const updateDots = () => dots.forEach((d, i) => d.classList.toggle('active', i === currentIdx));
                            slider.addEventListener('scroll', () => {
                                const imgs = slider.querySelectorAll('img');
                                const pos = slider.scrollLeft + slider.offsetWidth / 2;
                                imgs.forEach((img, i) => { if (pos > img.offsetLeft) currentIdx = i; });
                                updateDots();
                            });
                            const leftBtn = slider.parentElement.querySelector('.card-arrow-left');
                            const rightBtn = slider.parentElement.querySelector('.card-arrow-right');
                            if (leftBtn) leftBtn.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); currentIdx = Math.max(0, currentIdx - 1); slider.children[currentIdx].scrollIntoView({ behavior: 'smooth' }); updateDots(); });
                            if (rightBtn) rightBtn.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); currentIdx = Math.min(slider.children.length - 1, currentIdx + 1); slider.children[currentIdx].scrollIntoView({ behavior: 'smooth' }); updateDots(); });
                        }
                    }
                }, 100);

                return `
                    <a href="post.html?id=${post.id}" class="article-card">
                        <div class="article-img-wrap">
                            <div class="article-img-slider" id="slider-${post.id}">
                                ${imgUrls.map((url, i) => `<img class="article-img" src="${url}" alt="Image ${i+1}" loading="${i === 0 ? 'eager' : 'lazy'}" />`).join('')}
                            </div>
                            <div class="card-controls${!hasMultiple ? ' hidden' : ''}">
                                <div class="card-dots">${imgUrls.map((_, i) => `<span class="card-dot${i === 0 ? ' active' : ''}"></span>`).join('')}</div>
                                <div class="card-arrows">
                                    <button class="card-arrow card-arrow-left">‹</button>
                                    <button class="card-arrow card-arrow-right">›</button>
                                </div>
                            </div>
                        </div>
                        <div class="article-info">
                            <div class="meta-row">
                                <span class="tag-badge">${post.category || 'News'}</span>
                                <span class="date">${new Date(post.created_at).toLocaleDateString(currentLang === 'fr' ? 'fr-FR' : 'en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</span>
                            </div>
                            <h3 class="article-title">${post.title}</h3>
                        </div>
                    </a>
                `;
            }).join('');
        }

        // ===== FILTERS =====
        function updateCategoryFilter(posts) {
            const cats = [...new Set(posts.map(p => p.category).filter(Boolean))];
            const sel = document.getElementById('categoryFilter');
            sel.innerHTML = `<option value="all" data-i18n="cat-all">${currentLang === 'fr' ? 'Toutes les catégories' : 'Categories'}</option>`;
            cats.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.innerText = cat;
                sel.appendChild(opt);
            });
        }

        function filterPosts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const cat = document.getElementById('categoryFilter').value;
            const filtered = allPostsData.filter(p => {
                const matchSearch = p.title.toLowerCase().includes(query) || (p.content && p.content.toLowerCase().includes(query));
                return matchSearch && (cat === 'all' || p.category === cat);
            });
            buildGrid(filtered);
        }

        // ===== INIT =====
        async function init() {
            applyTranslations();
            startTickerRefresh();
            setupRealtime();

            const { data: posts } = await supabaseClient.from('posts').select('*').order('created_at', { ascending: false });
            if (!posts?.length) {
                document.getElementById('posts-grid-container').innerHTML = `<div>${currentLang === 'fr' ? 'Aucun article disponible.' : 'No articles available.'}</div>`;
                return;
            }
            allPostsData = posts;
            updateCategoryFilter(posts);
            renderDynamicContent(posts);
        }

        // ===== FOOTER =====
        fetch('footer.html')
            .then(r => r.text())
            .then(d => document.getElementById('footer-placeholder').innerHTML = d)
            .catch(() => document.getElementById('footer-placeholder').innerHTML = '<footer style="text-align:center;padding:2rem;color:#999;border-top:3px solid #131313;margin-top:2rem;font-size:0.8rem;">© 2024 Travel Press</footer>');

        window.onload = init;
        window.changeLanguage = changeLanguage;
        window.toggleMenu = toggleMenu;
        window.filterPosts = filterPosts;
    </script>
</body>
</html>
