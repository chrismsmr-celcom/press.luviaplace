<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Luvia Journal — Éditeur WYSIWYG</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- TinyMCE au lieu de SimpleMDE -->
    <script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/6/tinymce.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fafafa; padding: 3rem 1rem; color: #111; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 2.5rem; border: 1px solid #e5e5e5; border-radius: 12px; }
        h1 { font-size: 1.8rem; margin-bottom: 2rem; letter-spacing: -1px; }
        
        .edit-section { background: #f0f4ff; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; border: 1px solid #cce0ff; }
        .edit-section h2 { font-size: 1.1rem; margin-bottom: 1rem; margin-top: 0; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-row { display: flex; gap: 1.5rem; }
        .form-row .form-group { flex: 1; }
        label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.5rem; }
        input, textarea { width: 100%; padding: 0.75rem; border: 1px solid #e5e5e5; border-radius: 6px; font-family: inherit; font-size: 0.95rem; box-sizing: border-box; }
        input:focus { outline: none; border-color: #000; }
        
        .checkbox-group { display: flex; align-items: center; gap: 0.5rem; margin-top: 1.5rem; }
        .checkbox-group input { width: auto; cursor: pointer; }
        
        button { background: #000; color: #fff; border: none; padding: 0.75rem 1.5rem; font-weight: 600; border-radius: 6px; cursor: pointer; font-family: inherit; margin-top: 1.5rem; transition: opacity 0.2s; }
        button:hover { opacity: 0.85; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .btn-secondary { background: #e5e5e5; color: #111; margin-top: 0; }
        .btn-update { background: #0046e4; display: none; }
        
        .actions { display: flex; gap: 1rem; }
        .tox-tinymce { border-radius: 6px; }
        
        .tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 2px solid #e5e5e5; }
        .tab { padding: 0.8rem 1.5rem; cursor: pointer; border: none; background: none; font-weight: 600; color: #757575; font-family: inherit; }
        .tab.active { color: #0046e4; border-bottom: 2px solid #0046e4; margin-bottom: -2px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Luvia Journal — Éditeur WYSIWYG</h1>
    
    <div class="edit-section">
        <h2>Modifier un article existant (Optionnel)</h2>
        <div class="form-row" style="align-items: flex-end;">
            <div class="form-group" style="margin-bottom: 0;">
                <label>ID de l'article à modifier</label>
                <input type="text" id="edit_id" placeholder="Ex: 5f1b2a...">
            </div>
            <button class="btn-secondary" id="btnLoad" onclick="loadArticle()">Charger l'article</button>
        </div>
        <small style="display:block; margin-top:0.5rem; color:#666;">Laissez vide si vous créez un nouvel article.</small>
    </div>

    <!-- Onglets pour les langues -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab('fr')">🇫🇷 Français</button>
        <button class="tab" onclick="switchTab('en')">🇬🇧 English</button>
    </div>

    <div id="tab-fr">
        <div class="form-group">
            <label>Titre de l'article (FR)</label>
            <input type="text" id="title" placeholder="Ex: Échappée Premium en Namibie...">
        </div>
        
        <div class="form-group">
            <label>Catégorie (FR)</label>
            <input type="text" id="category" placeholder="Ex: Expérience, Conseils, Top 10" value="Expérience">
        </div>
    </div>

    <div id="tab-en" style="display:none;">
        <div class="form-group">
            <label>Article Title (EN)</label>
            <input type="text" id="title_en" placeholder="Ex: Premium Escape in Namibia...">
        </div>
        
        <div class="form-group">
            <label>Category (EN)</label>
            <input type="text" id="category_en" placeholder="Ex: Experience, Tips, Top 10" value="Experience">
        </div>
    </div>

    <div class="form-group">
        <label>Extrait / Description courte</label>
        <input type="text" id="excerpt" placeholder="Une courte phrase d'accroche...">
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>URL de l'image de couverture</label>
            <input type="text" id="image_url" placeholder="https://images.unsplash.com/...">
        </div>
        <div class="form-group">
            <label>Temps de lecture</label>
            <input type="text" id="reading_time" placeholder="5 min de lecture">
        </div>
    </div>

    <!-- Éditeur WYSIWYG pour le contenu -->
    <div class="form-group">
        <label>Contenu de l'article (Éditeur visuel - Insérez des images facilement)</label>
        <div id="content-tabs">
            <div id="editor-fr">
                <textarea id="content"></textarea>
            </div>
            <div id="editor-en" style="display:none;">
                <textarea id="content_en"></textarea>
            </div>
        </div>
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="is_featured">
        <label for="is_featured">Mettre cet article à la une dans le grand Hero principal</label>
    </div>

    <div class="actions">
        <button id="btnPublish" onclick="publishArticle()">Publier le nouvel article</button>
        <button id="btnUpdate" class="btn-update" onclick="updateArticle()">Mettre à jour l'article</button>
        <button id="btnCancel" class="btn-secondary" style="display:none;" onclick="cancelEdit()">Annuler</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ukbekfcjfcjcqrpxfpmq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrYmVrZmNqZmNqY3FycHhmcG1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDk2NzcsImV4cCI6MjA4OTkyNTY3N30.KK3nxQOLTi3IZjYoRtrNC6mS_ixSsrZMI3J4WfxJVYU';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Initialisation de TinyMCE pour le français
    tinymce.init({
        selector: '#content',
        height: 500,
        menubar: false,
        plugins: [
            'advlist', 'autolink', 'lists', 'link', 'image', 'charmap', 'preview',
            'anchor', 'searchreplace', 'visualblocks', 'code', 'fullscreen',
            'insertdatetime', 'media', 'table', 'help', 'wordcount'
        ],
        toolbar: 'undo redo | blocks | ' +
            'bold italic forecolor | alignleft aligncenter ' +
            'alignright alignjustify | bullist numlist outdent indent | ' +
            'removeformat | image media link | help',
        content_style: 'body { font-family:Plus Jakarta Sans,sans-serif; font-size:16px; }',
        // Configuration pour gérer les images
        images_upload_handler: function (blobInfo, progress) {
            return new Promise((resolve, reject) => {
                // Option 1: Upload vers Supabase Storage
                uploadImageToSupabase(blobInfo.blob())
                    .then(url => resolve(url))
                    .catch(error => {
                        // Option 2: Fallback - Convertir en base64
                        const reader = new FileReader();
                        reader.readAsDataURL(blobInfo.blob());
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                    });
            });
        }
    });

    // Initialisation de TinyMCE pour l'anglais
    tinymce.init({
        selector: '#content_en',
        height: 500,
        menubar: false,
        plugins: [
            'advlist', 'autolink', 'lists', 'link', 'image', 'charmap', 'preview',
            'anchor', 'searchreplace', 'visualblocks', 'code', 'fullscreen',
            'insertdatetime', 'media', 'table', 'help', 'wordcount'
        ],
        toolbar: 'undo redo | blocks | ' +
            'bold italic forecolor | alignleft aligncenter ' +
            'alignright alignjustify | bullist numlist outdent indent | ' +
            'removeformat | image media link | help',
        content_style: 'body { font-family:Plus Jakarta Sans,sans-serif; font-size:16px; }',
        images_upload_handler: function (blobInfo, progress) {
            return new Promise((resolve, reject) => {
                uploadImageToSupabase(blobInfo.blob())
                    .then(url => resolve(url))
                    .catch(error => {
                        const reader = new FileReader();
                        reader.readAsDataURL(blobInfo.blob());
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                    });
            });
        }
    });

    let currentEditId = null;
    let currentTab = 'fr';

    // Fonction pour uploader les images vers Supabase Storage
    async function uploadImageToSupabase(blob) {
        const fileName = `article-images/${Date.now()}-${Math.random().toString(36).substring(7)}.${blob.type.split('/')[1]}`;
        
        const { data, error } = await supabaseClient.storage
            .from('articles') // Nom de votre bucket Supabase
            .upload(fileName, blob, {
                contentType: blob.type,
                upsert: false
            });

        if (error) {
            console.error('Erreur upload image:', error);
            throw error;
        }

        // Récupérer l'URL publique
        const { data: { publicUrl } } = supabaseClient.storage
            .from('articles')
            .getPublicUrl(fileName);

        return publicUrl;
    }

    // Changement d'onglet de langue
    function switchTab(lang) {
        currentTab = lang;
        
        // Mise à jour des onglets
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        event.target.classList.add('active');
        
        // Afficher/masquer les champs
        document.getElementById('tab-fr').style.display = lang === 'fr' ? 'block' : 'none';
        document.getElementById('tab-en').style.display = lang === 'en' ? 'block' : 'none';
        document.getElementById('editor-fr').style.display = lang === 'fr' ? 'block' : 'none';
        document.getElementById('editor-en').style.display = lang === 'en' ? 'block' : 'none';
        
        // Rafraîchir TinyMCE
        if (lang === 'fr') {
            tinymce.get('content').focus();
        } else {
            tinymce.get('content_en').focus();
        }
    }

    // Charger un article existant
    async function loadArticle() {
        const idInput = document.getElementById('edit_id').value.trim();
        const btnLoad = document.getElementById('btnLoad');
        
        if (!idInput) {
            alert('Veuillez entrer un ID valide.');
            return;
        }

        btnLoad.disabled = true;
        btnLoad.innerText = "Chargement...";

        const { data, error } = await supabaseClient
            .from('posts')
            .select('*')
            .eq('id', idInput)
            .single();

        btnLoad.disabled = false;
        btnLoad.innerText = "Charger l'article";

        if (error || !data) {
            alert('Article introuvable.');
            return;
        }

        // Remplir les champs
        document.getElementById('title').value = data.title || '';
        document.getElementById('title_en').value = data.title_en || '';
        document.getElementById('excerpt').value = data.excerpt || '';
        document.getElementById('image_url').value = data.image_url || '';
        document.getElementById('reading_time').value = data.reading_time || '';
        document.getElementById('category').value = data.category || '';
        document.getElementById('category_en').value = data.category_en || '';
        document.getElementById('is_featured').checked = data.is_featured || false;
        
        // Remplir le contenu dans TinyMCE
        tinymce.get('content').setContent(data.content || '');
        tinymce.get('content_en').setContent(data.content_en || '');

        currentEditId = data.id;
        document.getElementById('btnPublish').style.display = 'none';
        document.getElementById('btnUpdate').style.display = 'block';
        document.getElementById('btnCancel').style.display = 'block';
    }

    function cancelEdit() {
        currentEditId = null;
        document.getElementById('edit_id').value = '';
        document.getElementById('title').value = '';
        document.getElementById('title_en').value = '';
        document.getElementById('excerpt').value = '';
        document.getElementById('image_url').value = '';
        document.getElementById('reading_time').value = '';
        document.getElementById('category').value = 'Expérience';
        document.getElementById('category_en').value = 'Experience';
        document.getElementById('is_featured').checked = false;
        
        tinymce.get('content').setContent('');
        tinymce.get('content_en').setContent('');

        document.getElementById('btnPublish').style.display = 'block';
        document.getElementById('btnUpdate').style.display = 'none';
        document.getElementById('btnCancel').style.display = 'none';
    }

    function getFormData() {
        return {
            title: document.getElementById('title').value,
            title_en: document.getElementById('title_en').value,
            excerpt: document.getElementById('excerpt').value,
            image_url: document.getElementById('image_url').value,
            reading_time: document.getElementById('reading_time').value,
            category: document.getElementById('category').value,
            category_en: document.getElementById('category_en').value,
            is_featured: document.getElementById('is_featured').checked,
            content: tinymce.get('content').getContent(), // HTML du contenu FR
            content_en: tinymce.get('content_en').getContent() // HTML du contenu EN
        };
    }

    async function handleFeaturedStatus(is_featured) {
        if (is_featured) {
            await supabaseClient.from('posts').update({ is_featured: false }).eq('is_featured', true);
        }
    }

    async function publishArticle() {
        const data = getFormData();
        const btn = document.getElementById('btnPublish');

        if(!data.title || !data.content) {
            alert('Le titre et le contenu sont obligatoires.');
            return;
        }

        btn.disabled = true;
        btn.innerText = "Publication...";

        await handleFeaturedStatus(data.is_featured);

        const { error } = await supabaseClient
            .from('posts')
            .insert([data]);

        if (error) {
            console.error(error);
            alert('Erreur : ' + error.message);
            btn.disabled = false;
            btn.innerText = "Publier le nouvel article";
        } else {
            alert('Article publié !');
            window.location.reload();
        }
    }

    async function updateArticle() {
        if (!currentEditId) return;
        
        const data = getFormData();
        const btn = document.getElementById('btnUpdate');

        if(!data.title || !data.content) {
            alert('Le titre et le contenu sont obligatoires.');
            return;
        }

        btn.disabled = true;
        btn.innerText = "Mise à jour...";

        await handleFeaturedStatus(data.is_featured);

        const { error } = await supabaseClient
            .from('posts')
            .update(data)
            .eq('id', currentEditId);

        if (error) {
            console.error(error);
            alert('Erreur : ' + error.message);
            btn.disabled = false;
            btn.innerText = "Mettre à jour l'article";
        } else {
            alert('Article mis à jour !');
            window.location.reload();
        }
    }
</script>
</body>
</html>
